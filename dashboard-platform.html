<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اختبار التحميل</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#05080f; color:white; font-family:monospace; padding:20px; }
    .box { background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; margin:10px 0; }
    .ok { color:#34D399; }
    .err { color:#EF4444; }
  </style>
</head>
<body>
  <div class="box" id="t1">⏳ انتظار...</div>
  <div class="box" id="t2">⏳ انتظار...</div>
  <div class="box" id="t3">⏳ انتظار...</div>

  <script>
    // اختبار 1: هل تم تحميل Supabase؟
    try {
      if (typeof window.supabase !== 'undefined') {
        document.getElementById('t1').innerHTML = '<span class="ok">✅ Supabase تم تحميله</span>';
      } else {
        document.getElementById('t1').innerHTML = '<span class="err">❌ Supabase غير موجود</span>';
      }
    } catch(e) {
      document.getElementById('t1').innerHTML = '<span class="err">❌ خطأ: ' + e.message + '</span>';
    }

    // اختبار 2: هل يمكن إنشاء عميل Supabase؟
    try {
      const sb = window.supabase.createClient(
        'https://lgyyqdelljbrbbwckqol.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneXlxZGVsbGpicmJid2NrcW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg4MjYwNDMsImV4cCI6MjA2NDQwMjA0M30._C8IqFVBluKxgkbYLG3PKNke5rvNtTgMo23V4yd-kCc'
      );
      document.getElementById('t2').innerHTML = '<span class="ok">✅ تم إنشاء العميل</span>';
    } catch(e) {
      document.getElementById('t2').innerHTML = '<span class="err">❌ خطأ: ' + e.message + '</span>';
    }

    // اختبار 3: هل يمكن الاتصال بقاعدة البيانات؟
    try {
      const sb = window.supabase.createClient(
        'https://lgyyqdelljbrbbwckqol.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneXlxZGVsbGpicmJid2NrcW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg4MjYwNDMsImV4cCI6MjA2NDQwMjA0M30._C8IqFVBluKxgkbYLG3PKNke5rvNtTgMo23V4yd-kCc'
      );
      sb.from('site_events').select('id', { count: 'exact', head: true }).then(function(result) {
        if (result.error) {
          document.getElementById('t3').innerHTML = '<span class="err">❌ فشل: ' + result.error.message + '</span>';
        } else {
          document.getElementById('t3').innerHTML = '<span class="ok">✅ نجح! الأحداث: ' + (result.count || 0) + '</span>';
        }
      }).catch(function(e) {
        document.getElementById('t3').innerHTML = '<span class="err">❌ خطأ: ' + e.message + '</span>';
      });
    } catch(e) {
      document.getElementById('t3').innerHTML = '<span class="err">❌ خطأ: ' + e.message + '</span>';
    }
  </script>
</body>
</html>
