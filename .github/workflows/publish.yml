name: Publish & Update All

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'articles/**'
      - 'sitemap.xml'

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📄 توليد صفحات المقالات
        run: python generate_articles.py

      - name: 🗺️ توليد sitemap.xml
        run: python generate_sitemap.py

      - name: 📤 رفع التحديثات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ sitemap.xml
          git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي"
          git push
