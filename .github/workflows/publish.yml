name: 📝 نشر وتحديث الموقع من تيليجرام

on:
  repository_dispatch:
    types: [new_article, update_site]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 إعادة بناء الموقع
        run: |
          echo "✅ البوت قام بحفظ المقالات مسبقاً في data/{tab}.json"
          echo "🔄 لا حاجة لمعالجة إضافية - جاري إعادة بناء الموقع فقط..."
          echo "📂 التبويب المستهدف: ${{ github.event.client_payload.tab }}"
          echo "📝 العنوان: ${{ github.event.client_payload.title }}"

      - name: 🚀 رفع التغييرات
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 [بوت] تحديث الموقع: ${{ github.event.client_payload.title }}"
          file_pattern: "data/ assets/images/"
          commit_user_name: "Telegram Bot"
          commit_user_email: "bot@bassam-portfolio.local"
          skip_dirty_check: true