name: Publish & Update Sitemap

on:
  push:
    branches: [ main ]

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v3

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🗺️ توليد sitemap.xml
        run: python generate_sitemap.py

      - name: 📤 رفع sitemap.xml الجديد
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي لـ sitemap.xml"
          git push
