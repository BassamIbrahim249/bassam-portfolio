name: 📝 نشر وتحديث الموقع من تيليجرام

on:
  repository_dispatch:
    types: [new_article, update_site]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 جاهز للنشر
        run: |
          echo "✅ البوت حفظ المقالات في data/${{ github.event.client_payload.tab }}.json"
          echo "🔄 جاري تأكيد الملفات وإعادة بناء الموقع..."
          echo "📝 المقال: ${{ github.event.client_payload.title }}"

      - name: 🚀 رفع التغييرات وتشغيل البناء
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 [بوت] تحديث: ${{ github.event.client_payload.title }}"
          file_pattern: "data/ assets/images/"
          commit_user_name: "Telegram Bot"
          commit_user_email: "bot@bassam-portfolio.local"
          skip_dirty_check: true