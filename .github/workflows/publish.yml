name: Publish & Update All

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'sitemap.xml'
      - 'articles/**'

jobs:
  update-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🗺️ توليد sitemap.xml
        run: python generate_sitemap.py

      - name: 📄 توليد صفحات HTML للمقالات
        run: python generate_articles.py

      - name: 📤 رفع جميع التحديثات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml articles/
          git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي لـ sitemap وصفحات المقالات"
          git push
