<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - BassamIbrahim</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #3B9EFF; font-size: 28px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
    .stat-value { font-size: 2.5em; font-weight: 700; color: #3B9EFF; }
    .stat-label { font-size: 0.9em; color: #94a3b8; margin-top: 4px; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    canvas { background: #1e293b; border-radius: 12px; padding: 16px; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    th { background: #3B9EFF; color: #fff; padding: 12px; text-align: right; font-size: 14px; }
    td { padding: 10px; border-bottom: 1px solid #334155; font-size: 13px; }
    tr:hover { background: rgba(59,158,255,0.05); }
    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 18px; }
    .empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 18px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-engineering { background: rgba(59,158,255,0.2); color: #3B9EFF; }
    .badge-political { background: rgba(96,207,255,0.2); color: #60CFFF; }
    .badge-nubian { background: rgba(234,179,8,0.2); color: #EAB308; }
    .badge-academy { background: rgba(167,139,250,0.2); color: #A78BFA; }
    .badge-health { background: rgba(52,211,153,0.2); color: #34D399; }
    .badge-general { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .feedback-yes { color: #34D399; }
    .feedback-no { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>📊 لوحة تحكم المساعد الذكي</h1>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="totalQuestions">-</div>
      <div class="stat-label">إجمالي الأسئلة</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="avgResponse">-</div>
      <div class="stat-label">متوسط وقت الاستجابة (ms)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="kbRate">-</div>
      <div class="stat-label">نسبة المطابقة مع KB</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="helpfulRate">-</div>
      <div class="stat-label">نسبة الرضا 👍</div>
    </div>
  </div>

  <div class="charts">
    <div>
      <h3 style="margin-bottom:12px;text-align:center;color:#94a3b8;">توزيع الأسئلة حسب القسم</h3>
      <canvas id="intentChart" height="200"></canvas>
    </div>
    <div>
      <h3 style="margin-bottom:12px;text-align:center;color:#94a3b8;">أنواع الردود</h3>
      <canvas id="responseTypeChart" height="200"></canvas>
    </div>
  </div>

  <h2 style="margin-bottom:16px;">🔍 أحدث الأسئلة</h2>
  <div id="tableContainer">
    <div class="loading">⏳ جاري تحميل البيانات...</div>
  </div>

  <script>
    const API_URL = 'https://bassam-portfolio-eight.vercel.app/api/get-analytics';

    function getBadgeClass(intent) {
      const map = { engineering: 'badge-engineering', political: 'badge-political', nubian: 'badge-nubian', academy: 'badge-academy', health: 'badge-health' };
      return map[intent] || 'badge-general';
    }

    function getIntentName(intent) {
      const map = { engineering: 'هندسة', political: 'سياسة', nubian: 'نوبيان', academy: 'أكاديمية', health: 'صحة' };
      return map[intent] || intent || 'عام';
    }

    async function loadDashboard() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();

        if (!data || data.length === 0) {
          document.getElementById('tableContainer').innerHTML = '<div class="empty">📭 لا توجد بيانات بعد. ابدأ بطرح الأسئلة على المساعد!</div>';
          return;
        }

        // إحصائيات
        document.getElementById('totalQuestions').textContent = data.length;
        
        const times = data.filter(r => r.response_time_ms > 0).map(r => r.response_time_ms);
        const avgTime = times.length > 0 ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0;
        document.getElementById('avgResponse').textContent = avgTime;
        
        const kbMatches = data.filter(r => r.kb_match === true).length;
        document.getElementById('kbRate').textContent = Math.round((kbMatches / data.length) * 100) + '%';
        
        const helpful = data.filter(r => r.was_helpful === true).length;
        const notHelpful = data.filter(r => r.was_helpful === false).length;
        const totalFeedback = helpful + notHelpful;
        document.getElementById('helpfulRate').textContent = totalFeedback > 0 ? Math.round((helpful / totalFeedback) * 100) + '%' : '-';

        // رسم بياني: التصنيفات
        const intents = {};
        data.forEach(r => { const i = r.intent || 'general'; intents[i] = (intents[i] || 0) + 1; });
        const intentLabels = Object.keys(intents).map(getIntentName);
        const intentValues = Object.values(intents);
        const intentColors = intentLabels.map((_, i) => ['#3B9EFF','#60CFFF','#EAB308','#A78BFA','#34D399','#94a3b8'][i % 6]);

        new Chart(document.getElementById('intentChart'), {
          type: 'doughnut',
          data: { labels: intentLabels, datasets: [{ data: intentValues, backgroundColor: intentColors }] },
          options: { responsive: true, maintainAspectRatio: true }
        });

        // رسم بياني: أنواع الردود
        const responseTypes = {};
        data.forEach(r => { const t = r.response_type || 'fallback'; responseTypes[t] = (responseTypes[t] || 0) + 1; });
        new Chart(document.getElementById('responseTypeChart'), {
          type: 'bar',
          data: {
            labels: Object.keys(responseTypes),
            datasets: [{ label: 'عدد الردود', data: Object.values(responseTypes), backgroundColor: '#3B9EFF' }]
          },
          options: { responsive: true, maintainAspectRatio: true }
        });

        // جدول أحدث الأسئلة
        let tableHTML = '<table><thead><tr><th>السؤال</th><th>التصنيف</th><th>النتائج</th><th>الوقت (ms)</th><th>التقييم</th><th>التاريخ</th></tr></thead><tbody>';
        data.slice(0, 20).forEach(r => {
          const question = (r.question || '').substring(0, 60) + ((r.question || '').length > 60 ? '...' : '');
          const intent = r.intent || 'general';
          const feedback = r.was_helpful === true ? '<span class="feedback-yes">👍</span>' : r.was_helpful === false ? '<span class="feedback-no">👎</span>' : '-';
          const date = r.created_at ? new Date(r.created_at).toLocaleString('ar-SD') : '-';
          tableHTML += `<tr>
            <td>${question}</td>
            <td><span class="badge ${getBadgeClass(intent)}">${getIntentName(intent)}</span></td>
            <td>${r.results_count || 0}</td>
            <td>${r.response_time_ms || '-'}</td>
            <td>${feedback}</td>
            <td>${date}</td>
          </tr>`;
        });
        tableHTML += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = tableHTML;

      } catch (e) {
        document.getElementById('tableContainer').innerHTML = '<div class="empty">⚠️ تعذر تحميل البيانات. تأكد من رفع api/get-analytics.js على Vercel.</div>';
        console.error(e);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
