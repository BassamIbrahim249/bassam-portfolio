<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم - بسام إبراهيم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #f5f5f5; }
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 18px; color: #333; }
  </style>
</head>
<body>
  <div class="loading">جاري تحميل لوحة التحكم...</div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.addEventListener('load', function() {
      setTimeout(function() {
        try {
          CMS.init({ config: '/config.yml' });
          console.log('Decap CMS initialized');
        } catch(e) {
          console.error('CMS init error:', e);
          document.body.innerHTML = '<div style="padding:20px;text-align:center;color:red;">خطأ في التحميل. تأكد من اتصالك بالإنترنت وأعد تحميل الصفحة.</div>';
        }
      }, 500);
    });
  </script>
</body>
</html>
