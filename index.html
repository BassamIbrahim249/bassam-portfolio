<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BassamIbrahim — منصة معرفية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #05080f 0%, #0a0f1a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* الهيدر */
    header {
      text-align: center;
      padding: 50px 20px 30px;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 15px;
    }
    header h1 span {
      background: linear-gradient(135deg, #3B9EFF, #60CFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: #8899bb;
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* التبويبات */
    .tabs {
      display: flex;
      gap: 10px;
      justify-content: center;      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8899bb;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Cairo';
      font-weight: 600;
      transition: all 0.3s;
    }
    .tab-btn.active {
      background: rgba(59,158,255,0.2);
      border-color: #3B9EFF;
      color: #fff;
    }
    .tab-btn:hover { transform: translateY(-2px); }
    
    /* العنوان */
    .section-title {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
      margin: 40px 0 25px;
      color: #EAB308;
    }
    
    /* البطاقات */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(59,158,255,0.4);
      box-shadow: 0 10px 30px rgba(59,158,255,0.1);
    }    .card-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .card p {
      color: #8899bb;
      font-size: 0.9rem;
      margin-bottom: 12px;
      min-height: 50px;
    }
    .card-date {
      font-size: 0.8rem;
      color: #6677aa;
      margin-bottom: 12px;
    }
    
    /* أزرار المكتبة */
    .lib-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .lib-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .preview-btn {
      background: rgba(167,139,250,0.2);
      color: #A78BFA;
      border-color: rgba(167,139,250,0.4);
    }
    .download-btn {
      background: rgba(59,158,255,0.2);
      color: #3B9EFF;
      border-color: rgba(59,158,255,0.4);
    }
    .lib-btn:hover { transform: translateY(-2px); }    
    /* الفوتر */
    footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 60px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #6677aa;
    }
    footer a {
      color: #3B9EFF;
      text-decoration: none;
      margin: 0 10px;
    }
    
    /* حالات التحميل */
    .loading {
      text-align: center;
      padding: 40px;
      color: #8899bb;
    }
    .error {
      text-align: center;
      padding: 20px;
      color: #ff6b6b;
      background: rgba(255,107,107,0.1);
      border-radius: 10px;
    }
    
    /* تفاصيل المقال */
    .article-detail {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px;
      margin: 20px 0;
    }
    .article-detail h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: #EAB308;
    }
    .article-detail .meta {
      color: #8899bb;
      font-size: 0.9rem;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }    .article-detail .content {
      line-height: 2;
      color: #c0c8d8;
    }
    .article-detail .content h2, 
    .article-detail .content h3 {
      color: #EAB308;
      margin: 20px 0 10px;
    }
    .article-detail .content p {
      margin-bottom: 15px;
    }
    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(59,158,255,0.2);
      color: #3B9EFF;
      border-radius: 10px;
      text-decoration: none;
      margin-bottom: 20px;
      border: 1px solid rgba(59,158,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bassam<span>Ibrahim</span></h1>
      <p>مهندس مدني · باحث في الشأن السوداني · ناشط مجتمعي</p>
    </header>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="all">📚 الكل</button>
      <button class="tab-btn" data-tab="engineering">🏗️ الهندسة</button>
      <button class="tab-btn" data-tab="political">🏛️ السياسة</button>
      <button class="tab-btn" data-tab="nubian">🏺 نوبيان</button>
      <button class="tab-btn" data-tab="academy">🎓 الأكاديمية</button>
      <button class="tab-btn" data-tab="lifestyle">🌿 الصحة</button>
    </div>

    <div id="content">
      <div class="loading">⏳ جاري تحميل المحتوى...</div>
    </div>

    <footer>
      <p>© 2026 BassamIbrahim Portfolio</p>
      <p style="margin-top: 10px;">
        <a href="https://github.com/bassamibrahim249/bassam-portfolio" target="_blank">GitHub</a>
      </p>
    </footer>  </div>

  <script>
    // 🚫 تعطيل Service Worker تماماً
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
    }

    // المتغيرات العامة
    let allArticles = [];
    let libraryFiles = [];
    let currentTab = 'all';
    let currentView = 'main'; // main, article

    // جلب المقالات من جميع التبويبات
    async function loadArticles() {
      const tabs = ['engineering', 'political', 'nubian', 'academy', 'lifestyle'];
      const articles = [];
      
      for (const tab of tabs) {
        try {
          const r = await fetch(`https://raw.githubusercontent.com/bassamibrahim249/bassam-portfolio/main/data/${tab}.json?v=${Date.now()}`);
          if (r.ok) {
            const data = await r.json();
            if (Array.isArray(data)) {
              data.forEach(a => {
                a.tab = tab;
                articles.push(a);
              });
            }
          }
        } catch (e) {
          console.log('خطأ في تحميل', tab, e);
        }
      }
      
      return articles;
    }

    // جلب ملفات المكتبة
    async function loadLibrary() {
      try {
        const r = await fetch(`https://raw.githubusercontent.com/bassamibrahim249/bassam-portfolio/main/library_index.json?v=${Date.now()}`);        if (r.ok) {
          const data = await r.json();
          return data.files || [];
        }
      } catch (e) {
        console.log('خطأ في تحميل المكتبة', e);
      }
      return [];
    }

    // عرض المحتوى الرئيسي
    function renderMain() {
      currentView = 'main';
      const content = document.getElementById('content');
      
      // المقالات
      let filteredArticles = currentTab === 'all' 
        ? allArticles 
        : allArticles.filter(a => a.tab === currentTab);
      
      filteredArticles = filteredArticles.sort((a, b) => 
        (b.date || '').localeCompare(a.date || '')
      ).slice(0, 20);

      // ملفات المكتبة
      let filteredFiles = currentTab === 'all'
        ? libraryFiles
        : libraryFiles.filter(f => f.category === currentTab);

      let html = '';

      // المقالات
      if (filteredArticles.length > 0) {
        html += '<h2 class="section-title">📰 أحدث المقالات</h2>';
        html += '<div class="cards">';
        filteredArticles.forEach(a => {
          const title = a.title_ar || a.title || 'بدون عنوان';
          const desc = (a.content_ar || a.content || '').substring(0, 100).replace(/[#*`]/g, '');
          html += `
            <div class="card" onclick="showArticle('${a.id}')">
              <div class="card-icon">📄</div>
              <h3>${title}</h3>
              <p>${desc}...</p>
              <div class="card-date">📅 ${a.date || 'بدون تاريخ'}</div>
            </div>
          `;
        });
        html += '</div>';
      }
      // المكتبة
      if (filteredFiles.length > 0) {
        html += '<h2 class="section-title">📚 المكتبة الرقمية</h2>';
        html += '<div class="cards">';
        filteredFiles.forEach(f => {
          const title = f.title_ar || f.title || 'بدون عنوان';
          const desc = f.description_ar || f.description || '';
          const icon = f.fileType === 'pdf' ? '📕' : 
                       f.fileType === 'pptx' ? '📊' : 
                       f.fileType === 'docx' ? '📘' : '📄';
          html += `
            <div class="card">
              <div class="card-icon">${icon}</div>
              <h3>${title}</h3>
              <p>${desc}</p>
              <div class="card-date">📦 ${f.fileSize || '—'}</div>
              ${f.downloadUrl ? `
                <div class="lib-buttons">
                  <a href="${f.downloadUrl}" target="_blank" class="lib-btn preview-btn">👁️ معاينة</a>
                  <a href="${f.downloadUrl}" target="_blank" class="lib-btn download-btn">📥 تحميل</a>
                </div>
              ` : '<div style="color:#ff6b6b;font-size:0.85rem;">⚠️ الرابط غير متاح</div>'}
            </div>
          `;
        });
        html += '</div>';
      }

      if (html === '') {
        html = '<div class="loading">📭 لا يوجد محتوى في هذا القسم بعد</div>';
      }

      content.innerHTML = html;
    }

    // عرض مقال
    window.showArticle = function(id) {
      currentView = 'article';
      const article = allArticles.find(a => a.id === id);
      if (!article) return;

      const content = document.getElementById('content');
      const title = article.title_ar || article.title || 'بدون عنوان';
      const body = article.content_ar || article.content || '';
      
      // تحويل Markdown بسيط إلى HTML
      let htmlBody = body
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
      htmlBody = '<p>' + htmlBody + '</p>';

      content.innerHTML = `
        <a href="#" class="back-btn" onclick="renderMain(); return false;">← العودة</a>
        <div class="article-detail">
          <h1>${title}</h1>
          <div class="meta">
            ✍️ ${article.author_ar || article.author || 'بسام إبراهيم'} 
            · 📅 ${article.date || 'بدون تاريخ'}
          </div>
          <div class="content">${htmlBody}</div>
        </div>
      `;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // تفعيل التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        renderMain();
      });
    });

    // التحميل الأولي
    async function init() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">⏳ جاري تحميل المحتوى...</div>';
      
      try {
        const [articles, files] = await Promise.all([
          loadArticles(),
          loadLibrary()
        ]);
        
        allArticles = articles;
        libraryFiles = files;
        
        renderMain();
      } catch (e) {
        content.innerHTML = '<div class="error">⚠️ خطأ في تحميل المحتوى: ' + e.message + '</div>';
      }
    }
    // بدء التشغيل
    init();
  </script>
</body>
</html>
