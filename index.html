<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bassam Ibrahim | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #080c12; font-family: 'Cairo', sans-serif; color: #ffffff; }
    .grad-text { background: linear-gradient(135deg, #3B9EFF, #60CFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(13,17,23,0.8); border: 1px solid rgba(59,158,255,0.1); transition: 0.3s; }
    .card:hover { transform: translateY(-10px); border-color: #3B9EFF; box-shadow: 0 10px 30px rgba(59,158,255,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const CARDS = [
      { title: "المنصة الهندسية", desc: "أبحاث علوم المواد وابتكارات الإنشاء وتطبيقات الصمغ العربي.", icon: "🏗️", accent: "#3B9EFF" },
      { title: "الأرشيف السياسي", desc: "تحليلات استراتيجية ورؤى فكرية في الشأن السوداني والدولي.", icon: "⚖️", accent: "#60CFFF" },
      { title: "أكاديمية المنظمات", desc: "كتابة المشاريع والمنح الدولية ومهارات القيادة التنموية.", icon: "🎓", accent: "#A78BFA" },
      { title: "نمط الحياة والرياضة", desc: "فلسفة الصحة الشاملة، التميز البدني، والأنظمة الغذائية العلمية.", icon: "🏃‍♂️", accent: "#34D399" }
    ];

    function App() {
      return (
        <div className="min-h-screen pb-20">
          {/* Header */}
          <nav className="p-6 flex justify-between items-center max-w-6xl mx-auto">
            <div className="text-xl font-black grad-text">BASSAM.I</div>
            <div className="hidden md:flex gap-8 text-sm text-gray-400">
              <a href="#">هندسة</a><a href="#">سياسة</a><a href="#">منظمات</a><a href="#">رياضة</a>
            </div>
          </nav>

          {/* Hero */}
          <section className="text-center pt-20 px-6">
            <h1 className="text-5xl md:text-7xl font-black mb-6">Bassam <span className="grad-text">Ibrahim</span></h1>
            <p className="text-gray-400 max-w-2xl mx-auto leading-relaxed text-lg">
              مهندس باحث متخصص في علوم المواد وتطبيقاتها المبتكرة. أمتلك رؤية تحليلية متكاملة تدمج الدقة الهندسية مع عمق التحليل الاستراتيجي.
            </p>
          </section>

          {/* الأقسام الأربعة */}
          <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-6xl mx-auto px-6 mt-20">
            {CARDS.map((card, i) => (
              <div key={i} className="card p-8 rounded-2xl text-center">
                <div className="text-4xl mb-4">{card.icon}</div>
                <h3 className="font-bold text-lg mb-2" style={{color: card.accent}}>{card.title}</h3>
                <p className="text-gray-400 text-sm leading-relaxed">{card.desc}</p>
              </div>
            ))}
          </section>

          {/* تطبيقات التواصل */}
          <footer className="mt-32 text-center">
            <p className="text-blue-400 text-xs tracking-widest uppercase mb-8">تواصل معي</p>
            <div className="flex justify-center gap-6">
              {['LinkedIn', 'WhatsApp', 'Facebook', 'X'].map(social => (
                <a key={social} href="#" className="w-12 h-12 flex items-center justify-center rounded-xl bg-gray-900 border border-gray-800 hover:border-blue-500 transition-all text-xs text-gray-500 hover:text-blue-400">
                  {social}
                </a>
              ))}
            </div>
            <p className="text-gray-600 text-xs mt-12">© 2026 Bassam Ibrahim. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
