    };

    // ===== Helpers =====
    const useDebounce = (value, delay) => {
      const [d, setD] = useState(value);
      useEffect(()=>{const h=setTimeout(()=>setD(value),delay);return()=>clearTimeout(h);},[value,delay]);
      return d;
    };

    function parseMarkdownToHTML(md) {
      if (!md || typeof md !== 'string') return "";
      let h = md;
      h = h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
      h = h.replace(/^#### (.*$)/gim,'<h4>$1</h4>').replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>');
      h = h.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
      h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" loading="lazy" />');
      h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      h = h.replace(/^---$/gim,'<hr />').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br />');
      h = '<p>' + h + '</p>';
      h = h.replace(/<p><\/p>/g,'');
      return h;
    }

    // ===== ✨ StarField =====
    const STARS = Array.from({length:45}, (_,i) => ({
      id: i,
      size: Math.random()*2.5+0.8,
      left: Math.random()*100,
      top: Math.random()*100,
      duration: Math.random()*10+7,
      delay: Math.random()*6,
      opacity: Math.random()*0.45+0.1,
      color: ['#3B9EFF','#60CFFF','#A78BFA','#EAB308','#34D399'][Math.floor(Math.random()*5)]
    }));

    function StarField({ theme }) {
      if (theme === 'light') return null;
      return (
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
          {STARS.map(s=>(
            <div key={s.id} style={{
              position:'absolute',
              width:s.size,height:s.size,
              borderRadius:'50%',
              background:s.color,
              left:`${s.left}%`,top:`${s.top}%`,
              opacity:s.opacity,
              boxShadow:`0 0 ${s.size*3}px ${s.color}`,
              animation:`floatStar ${s.duration}s ease-in-out infinite`,
              animationDelay:`${s.delay}s`
            }}/>
          ))}
        </div>
      );
    }

    // ===== ✨ Typewriter =====
    function TypeWriter({ texts, color='#3B9EFF' }) {
      const [display, setDisplay] = useState('');
      const [idx, setIdx] = useState(0);
      const [phase, setPhase] = useState('typing');
      useEffect(()=>{
        const current = texts[idx % texts.length];
        let timer;
        if(phase==='typing'){
          if(display.length < current.length){
            timer = setTimeout(()=>setDisplay(current.slice(0,display.length+1)), 75);
          } else {
            timer = setTimeout(()=>setPhase('deleting'), 2200);
          }
        } else {
          if(display.length > 0){
            timer = setTimeout(()=>setDisplay(d=>d.slice(0,-1)), 38);
          } else {
            setIdx(i=>i+1); setPhase('typing');
          }
        }
        return ()=>clearTimeout(timer);
      },[display,phase,idx,texts]);
      return (
        <span style={{color, fontWeight:900}}>
          {display}<span className="tw-cursor" style={{color, marginRight:2}}>|</span>
        </span>
      );
    }

    // ===== ✨ Progress Ring =====
    function ProgressRing() {
      const [progress, setProgress] = useState(0);
      const [visible, setVisible] = useState(false);
      useEffect(()=>{
        const h=()=>{
          const total = document.documentElement.scrollHeight - window.innerHeight;
          const pct = total > 0 ? (window.scrollY/total)*100 : 0;
          setProgress(pct);
          setVisible(window.scrollY > 300);
          // شريط القراءة أيضاً
          document.getElementById('readProgress')?.style.setProperty('width',`${pct}%`);
        };
        window.addEventListener('scroll',h,{passive:true});
        return ()=>window.removeEventListener('scroll',h);
      },[]);
      if(!visible) return null;
      const r=18, circ=2*Math.PI*r;
      const offset = circ - (progress/100)*circ;
      return (
        <div onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
          style={{position:'fixed',bottom:24,left:24,zIndex:99,cursor:'pointer',
            animation:'ringFadeIn 0.3s ease',filter:'drop-shadow(0 0 8px rgba(59,158,255,0.5))'}}>
          <svg width="48" height="48" style={{transform:'rotate(-90deg)'}}>
            <circle cx="24" cy="24" r={r} fill="rgba(5,8,15,0.7)" stroke="rgba(59,158,255,0.2)" strokeWidth="3"/>
            <circle cx="24" cy="24" r={r} fill="none" stroke="#3B9EFF" strokeWidth="3"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{transition:'stroke-dashoffset 0.2s ease'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:10,fontWeight:700,color:'#3B9EFF',transform:'rotate(90deg)'}}>
            {Math.round(progress)}%
          </div>
        </div>
      );
    }

      const title = encodeURIComponent(article.title);
      const handleShare = async () => {
        if(navigator.share){try{await navigator.share({title:article.title,url:window.location.href});}catch(e){}}
        else{window.open(`https://wa.me/?text=${title}%0A${url}`,'_blank');}
      };
      const handleCopy = async () => {
        try{await navigator.clipboard.writeText(window.location.href);setCopied(true);setTimeout(()=>setCopied(false),2000);}
        catch(e){const i=document.createElement('input');i.value=window.location.href;document.body.appendChild(i);i.select();document.execCommand('copy');document.body.removeChild(i);setCopied(true);setTimeout(()=>setCopied(false),2000);}
      };
      const open = p => window.open({whatsapp:`https://wa.me/?text=${title}%0A${url}`,facebook:`https://www.facebook.com/sharer/sharer.php?u=${url}`,twitter:`https://twitter.com/intent/tweet?text=${title}&url=${url}`,telegram:`https://t.me/share/url?url=${url}&text=${title}`}[p],'_blank');
      const btn = (label,color,bgAlpha,onClick) => (
        <button onClick={onClick} style={{padding:'8px 14px',borderRadius:8,background:`rgba(${color},${bgAlpha})`,border:`1px solid rgba(${color},0.4)`,color:`rgb(${color})`,cursor:'pointer',fontFamily:'Cairo',fontSize:11,fontWeight:600,transition:'all 0.2s'}}>{label}</button>
      );
      return (
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:16,paddingTop:16,borderTop:'1px solid var(--border-color)'}}>
          {btn('📤 مشاركة','59,158,255',0.1,handleShare)}
          {btn('📘 فيسبوك','24,119,242',0.1,()=>open('facebook'))}
          {btn('📲 واتساب','37,211,102',0.1,()=>open('whatsapp'))}
          {btn('𝕏 تويتر','200,200,200',0.05,()=>open('twitter'))}
          {btn('💬 تيليجرام','0,136,204',0.1,()=>open('telegram'))}
          <button onClick={handleCopy} style={{padding:'8px 14px',borderRadius:8,background:copied?'rgba(37,211,102,0.2)':'rgba(200,200,200,0.05)',border:copied?'1px solid rgba(37,211,102,0.5)':'1px solid rgba(200,200,200,0.2)',color:copied?'#25D366':'var(--text-secondary)',cursor:'pointer',fontFamily:'Cairo',fontSize:11,fontWeight:600}}>
            {copied?'✅ تم النسخ!':'📋 نسخ الرابط'}
          </button>
        </div>
      );
    }

    // ===== Articles =====
    function ArticleListSection({ title, category, onBack, lang }) {
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [openIndex, setOpenIndex] = useState(null);
      const [lastOpenedIndex, setLastOpenedIndex] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [visibleCount, setVisibleCount] = useState(ITEMS_PER_PAGE);
      const debouncedQuery = useDebounce(searchQuery, 300);
      const t = k => I18N[lang]?.[k]||k;

      useEffect(()=>{
        setLoading(true); setError(null); setVisibleCount(ITEMS_PER_PAGE);
        const dataFile = getDataFile(category);
        if(!dataFile){ setArticles([]); setLoading(false); return; }
        const cacheKey = `bassam_articles_cache_${dataFile.replace('data/','').replace('.json','')}`;
        const cached = localStorage.getItem(cacheKey);
        if(cached){try{const p=JSON.parse(cached);if(p.timestamp&&(Date.now()-p.timestamp)<CONFIG.cache.ttl){setArticles(p.data);setLoading(false);return;}}catch(e){}}
        fetch(`${dataFile}?v=${APP_VERSION}`)
          .then(r=>{if(!r.ok)throw new Error();return r.json();})
          .then(d=>{const a=Array.isArray(d)?d:[];try{localStorage.setItem(cacheKey,JSON.stringify({timestamp:Date.now(),data:a}));}catch(e){}setArticles(a);})
          .catch(()=>{if(!navigator.onLine){setError('أنت غير متصل بالإنترنت.');document.getElementById('offlineBanner')?.classList.add('show');}else{setArticles([]);}})
          .finally(()=>setLoading(false));
      },[category]);

      const handleToggle = idx => {
        if(openIndex===idx){setOpenIndex(null);}
        else{setOpenIndex(idx);setLastOpenedIndex(idx);setTimeout(()=>document.getElementById(`article-${idx}`)?.scrollIntoView({behavior:'smooth',block:'start'}),150);}
      };

      const btnSlug = BUTTON_SLUGS[category]||category;
      const filtered = category ? articles.filter(a=>a.button===btnSlug||a.category===category) : articles;
      const sorted = [...filtered].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      const searched = debouncedQuery.trim()===''?sorted:sorted.filter(a=>a.title?.toLowerCase().includes(debouncedQuery.toLowerCase())||a.tags?.some(tag=>tag.toLowerCase().includes(debouncedQuery.toLowerCase())));
      const displayed = searched.slice(0, visibleCount);
      const hasMore = searched.length > visibleCount;

      return (
        <div style={{padding:'100px 24px 60px',maxWidth:900,margin:'0 auto',fontFamily:'Cairo'}}>
          <button onClick={onBack} className="glass-card" style={{marginBottom:32,padding:'12px 24px',borderRadius:14,background:'var(--glass-bg)',border:'1px solid var(--glass-border)',color:'var(--text-secondary)',cursor:'pointer',fontSize:14,fontWeight:700,display:'inline-flex',alignItems:'center',gap:8}}>← {t('back')}</button>
          <h2 style={{fontSize:'clamp(1.5rem,4vw,2rem)',fontWeight:900,marginBottom:30,textAlign:'center',color:'var(--accent-gold)'}}>{title}</h2>
          <input type="text" className="search-input" placeholder={t('search')} value={searchQuery}
            onChange={e=>{setSearchQuery(e.target.value);setVisibleCount(ITEMS_PER_PAGE);}}
            style={{width:'100%',padding:'14px 20px',borderRadius:14,fontFamily:'Cairo',fontSize:14,marginBottom:24,outline:'none'}} />
          {loading
            ? <div style={{display:'flex',flexDirection:'column',gap:14}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:90}}></div>)}</div>
            : error
              ? <div style={{textAlign:'center',color:'#ff6b6b',padding:40}}><p style={{fontSize:48,marginBottom:12}}>⚠️</p><p>{error}</p><button onClick={()=>window.location.reload()} className="glass-card" style={{marginTop:20,padding:'10px 24px',borderRadius:12,color:'#ff6b6b',cursor:'pointer',fontWeight:700}}>{t('retry')}</button></div>
              : displayed.length===0
                ? <div style={{textAlign:'center',color:'var(--text-secondary)',padding:60}}><p style={{fontSize:56,marginBottom:16}}>📝</p><p style={{fontSize:16}}>{t('noArticles')}</p></div>
                : (<div>
                    {displayed.map((article,idx)=>{
                      const isOpen = openIndex===idx;
                      const rawHTML = parseMarkdownToHTML(article.content||'');
                      const cleanHTML = typeof DOMPurify!=='undefined'
                        ? DOMPurify.sanitize(rawHTML,{ALLOWED_TAGS:['h1','h2','h3','h4','p','br','strong','em','a','img','ul','ol','li','table','thead','tbody','tr','th','td','code','pre','blockquote','hr','span','div'],ALLOWED_ATTR:['href','target','rel','src','alt','loading','style','class']})
                        : rawHTML;
                      const commentId = article.id||article.title?.replace(/\s+/g,'-').substring(0,50)||String(idx);
                      return (
                        <div key={article.id||idx} id={`article-${idx}`}
                          className={`accordion-item glass-card ${lastOpenedIndex===idx?'last-opened':''}`}
                          style={{marginBottom:14,borderRadius:16,overflow:'hidden'}}>
                          <div onClick={()=>handleToggle(idx)}
                            style={{padding:'18px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',gap:12}}>
                            <div style={{flex:1}}>
                              <h3 style={{fontSize:16,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>{article.title||'بدون عنوان'}</h3>
                              <span style={{fontSize:11,color:'var(--text-secondary)'}}>{article.date}</span>
                            </div>
                            <button style={{padding:'8px 18px',borderRadius:10,background:isOpen?'rgba(200,200,200,0.06)':'rgba(234,179,8,0.15)',color:isOpen?'var(--text-secondary)':'var(--accent-gold)',border:'none',cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:'Cairo',whiteSpace:'nowrap',transition:'all 0.2s'}}>
                              {isOpen?t('close'):t('read')}
                            </button>
                          </div>
                          {isOpen&&(
                            <div style={{padding:'0 20px 24px'}}>
                              {article.image&&<img src={article.image} alt={article.title} style={{width:'100%',borderRadius:12,marginBottom:20,boxShadow:'0 8px 30px rgba(0,0,0,0.3)'}} loading="lazy" onError={e=>e.target.style.display='none'} />}
                              <div className="article-body" dangerouslySetInnerHTML={{__html:cleanHTML}} />
                              <div className="author-meta">✍️ {article.author||'بسام إبراهيم أحمد'} · 📅 {article.date} · ⏱️ {Math.ceil((article.content||'').split(' ').length/200)} {t('minRead')}</div>
                              <ShareButtons article={article} lang={lang} />
                              <CommentsSection articleId={commentId} />
                              <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--border-color)'}}>
                                <h4 style={{fontSize:13,color:'var(--accent-gold)',marginBottom:10,fontWeight:700}}>{t('related')}</h4>
                                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                                  {articles.filter(a=>a.id!==article.id&&(a.button===article.button||a.tags?.some(tg=>article.tags?.includes(tg)))).slice(0,3).map(rel=>(
                                    <button key={rel.id} className="glass-card" onClick={()=>{const i=articles.findIndex(x=>x.id===rel.id);if(i!==-1){setOpenIndex(i);setLastOpenedIndex(i);window.scrollTo({top:0,behavior:'smooth'});}}} style={{fontSize:11,padding:'6px 12px',borderRadius:8,background:'rgba(59,158,255,0.1)',color:'var(--accent-blue)',border:'1px solid rgba(59,158,255,0.3)',cursor:'pointer',fontWeight:600,fontFamily:'Cairo'}}>{rel.title?.substring(0,28)}...</button>
                                  ))}
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {hasMore&&(
                      <div style={{textAlign:'center',marginTop:24}}>
                        <button onClick={()=>setVisibleCount(p=>p+ITEMS_PER_PAGE)} className="glass-card"
                          style={{padding:'14px 36px',borderRadius:14,background:'rgba(59,158,255,0.1)',border:'1px solid rgba(59,158,255,0.3)',color:'var(--accent-blue)',fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'Cairo'}}>
                          {t('loadMore')} ({searched.length-visibleCount} {t('remaining')})
                        </button>
                      </div>
                    )}
                  </div>)
          }
        </div>
      );
    }

    // ===== App =====
    function App() {
      const [lang, setLang] = useState('ar');
      const [theme, setTheme] = useState(() => localStorage.getItem('theme')||'dark');
      const [activeSection, setActiveSection] = useState(null);
      const [activeCategory, setActiveCategory] = useState(null);
      const [originTabId, setOriginTabId] = useState(null);
      const t = k => I18N[lang]?.[k]||k;

      useEffect(()=>{
        document.body.className = theme;
        localStorage.setItem('theme', theme);
        document.documentElement.setAttribute('dir', lang==='ar'?'rtl':'ltr');
        document.documentElement.setAttribute('lang', lang);
      },[theme,lang]);

      const scrollTo = id => document.getElementById(id)?.scrollIntoView({behavior:'smooth'});

      // ✅ originTabId يُحفظ مباشرة من card.id
      const handleTagClick = (tag, tabId) => {
        setOriginTabId(tabId);
        setActiveCategory(tag);
        setActiveSection('articles');
        window.scrollTo({top:0,behavior:'smooth'});
      };
      const handleLibraryClick = (slug, tabId) => {
        setOriginTabId(tabId);
        setActiveCategory(`library_${slug}`);
        setActiveSection('articles');
        window.scrollTo({top:0,behavior:'smooth'});
      };

      if(activeSection==='articles'){
        const handleBack = () => {
          setActiveSection(null);
          setActiveCategory(null);
          setTimeout(()=>{
            if(originTabId) document.getElementById(originTabId)?.scrollIntoView({behavior:'smooth',block:'start'});
          },100);
        };
        if(activeCategory?.startsWith('library_')) return <LibrarySection category={activeCategory} onBack={handleBack} lang={lang}/>;
        return <ArticleListSection title={activeCategory||t('articles')} category={activeCategory} onBack={handleBack} lang={lang}/>;
      }

      const TW_TEXTS = lang==='ar'
        ? ['مهندس مدني','باحث في الشأن السوداني','ناشط مجتمعي','مبتكر هندسي']
        : ['Civil Engineer','Sudan Researcher','Community Activist','Engineering Innovator'];

      const CARDS = [
