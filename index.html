    function Card({ card }) {
      const [hover, setHover] = useState(false);
      const isNubian = card.id === "nubian";
      const hoverBg = isNubian ? "rgba(234,179,8,0.06)" : "rgba(59,158,255,0.06)";
      const hoverBorder = isNubian ? "rgba(234,179,8,0.4)" : "rgba(59,158,255,0.3)";
      const hoverShadow = isNubian
        ? "0 20px 40px -15px rgba(0,0,0,0.5), 0 0 20px rgba(234,179,8,0.2)"
        : "0 20px 40px -15px rgba(0,0,0,0.5), 0 0 20px rgba(59,158,255,0.1)";

      return (
        <div
          id={card.id}
          className="card-wrap"
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            position: "relative",
            background: hover ? hoverBg : "rgba(255,255,255,0.02)",
            border: "1px solid",
            borderColor: hover ? hoverBorder : "rgba(255,255,255,0.06)",
            borderRadius: 20,
            padding: "32px 28px",
            overflow: "hidden",
            cursor: "pointer",
            transform: hover ? "translateY(-6px)" : "translateY(0)",
            boxShadow: hover ? hoverShadow : "none",
            scrollMarginTop: 100,
          }}
        >
          <div className="card-top-line" style={{
            position: "absolute", top: 0, left: 0, right: 0, height: 2,
            background: hover ? card.accent : "transparent",
          }} />
          <div className="card-icon-box" style={{
            width: 56, height: 56, borderRadius: 14,
            display: "flex", alignItems: "center", justifyContent: "center",
            background: hover ? (isNubian ? "rgba(234,179,8,0.1)" : "rgba(255,255,255,0.05)") : "rgba(255,255,255,0.03)",
            border: "1px solid",
            borderColor: hover ? (isNubian ? "rgba(234,179,8,0.4)" : "rgba(255,255,255,0.15)") : "rgba(255,255,255,0.05)",
            boxShadow: hover && isNubian ? "0 0 15px rgba(234,179,8,0.3)" : "none"
          }}>
            {card.icon}
          </div>

          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 8 }}>{card.title}</h3>
          <p style={{ fontSize: 12, fontWeight: 600, color: card.accent, marginBottom: 14, opacity: 0.9 }}>{card.subtitle}</p>
          <p style={{ fontSize: 13, color: "#8899bb", lineHeight: 1.7, marginBottom: 24 }}>{card.desc}</p>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>
            {card.tags.map(tag => (
              <span key={tag} className="card-tag" style={{
                fontSize: 10, padding: "4px 10px", borderRadius: 6,
                background: hover ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.03)",
                color: hover ? "#fff" : "#6677aa",
                border: "1px solid rgba(255,255,255,0.05)",
              }}>{tag}</span>
            ))}
          </div>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div className="card-cta" style={{
              display: "flex", alignItems: "center", gap: 8,
              fontSize: 12, fontWeight: 700, color: hover ? card.accent : "#445566",
            }}>
              <span>اكتشف المزيد</span>
              <span className="card-cta-arrow" style={{ transform: hover ? "translateX(-4px)" : "none" }}>←</span>
            </div>

                rel="noopener noreferrer"
                className="academic-link"
                style={{

    function BackToTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const handleScroll = () => setVisible(window.scrollY > 600);
        window.addEventListener("scroll", handleScroll, { passive: true });
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      if (!visible) return null;

      return (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          className="back-to-top"
          style={{
            position: "fixed", bottom: 24, left: 24, zIndex: 99,
            width: 44, height: 44, borderRadius: "50%",
            background: "rgba(59,158,255,0.15)",
            border: "1px solid rgba(59,158,255,0.4)",
            color: "#3B9EFF", fontSize: 20, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "opacity 0.3s ease, transform 0.3s ease",
          }}
          aria-label="العودة للأعلى"
        >
          ↑
        </button>
      );
    }
