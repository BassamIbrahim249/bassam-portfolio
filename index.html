<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bassam Ibrahim | معرض الأعمال</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b132b;
            color: #ffffff;
        }
        /* مظهر مخصص لشريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b132b;
        }
        ::-webkit-scrollbar-thumb {
            background: #1c2541;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #48cae4;
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="flex items-center justify-center min-h-screen bg-[#0b132b] text-white p-4 text-center">
            <div>
                <i class="fas fa-spinner fa-spin text-4xl text-[#48cae4] mb-4"></i>
                <p class="text-lg">جاري تحميل معرض الأعمال...</p>
                <p class="text-sm text-gray-4xl mt-2">إذا استمرت الشاشة سوداء، يرجى التحقق من اتصال الإنترنت أو تحديث الصفحة.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // مكوّن لبطاقات المشاريع والأبحاث
        const Card = ({ title, category, description, icon, tags }) => (
            <div class="bg-[#1c2541] rounded-xl p-6 border border-[#3a506b]/30 hover:border-[#48cae4]/50 transition-all duration-300 shadow-lg hover:-translate-y-1">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-semibold px-3 py-1 bg-[#48cae4]/10 text-[#48cae4] rounded-full">
                        {category}
                    </span>
                    <i class={`${icon} text-xl text-[#ffd700]`}></i>
                </div>
                <h3 class="text-xl font-bold mb-2 text-white">{title}</h3>
                <p class="text-gray-300 text-sm leading-relaxed mb-4">{description}</p>
                <div class="flex flex-wrap gap-2">
                    {tags.map((tag, idx) => (
                        <span key={idx} class="text-xs bg-[#0b132b] text-gray-4xl px-2 py-1 rounded">
                            {tag}
                        </span>
                    ))}
                </div>
            </div>
        );

        // المكوّن الرئيسي للموقع
        const Portfolio = () => {
            const [activeTab, setActiveTab] = React.useState('all');
            const [searchTerm, setSearchTerm] = React.useState('');

            const items = [
                {
                    id: 1,
                    title: "دراسة تأثير الصمغ العربي على الهيدرات الإسمنتية",
                    category: "research",
                    description: "بحث تجريبي تفصيلي يدرس الخصائص الإنشائية وزمن الشك عند إضافة نسب محددة من الصمغ العربي للمركبات الإسمنتية.",
                    icon: "fas fa-flask",
                    tags: ["مواد إنشائية", "أبحاث خرسانية", "الصمغ العربي"]
                },
                {
                    id: 2,
                    title: "نظام أتمتة النشر والتوزيع الرقمي",
                    category: "tech",
                    description: "تطوير وبناء نظام مستقر عبر بوت تليجرام لإدارة وتوثيق المقالات والأرشيف التاريخي والاستراتيجي بكفاءة عالية.",
                    icon: "fas fa-robot",
                    tags: ["Termux", "Python", "أتمتة"]
                },
                {
                    id: 3,
                    title: "الهوية البصرية وإرث الأنماط النوبية",
                    category: "design",
                    description: "تصميم شعارات وأيقونات مستوحاة من الأهرامات السودانية والزخارف الهندسية النوبية لدمج الأصالة بالهوية الرقمية.",
                    icon: "fas fa-palette",
                    tags: ["هوية بصرية", "ثقافة سودانية", "تصميم هندسي"]
                }
            ];

            const filteredItems = items.filter(item => {
                const matchesTab = activeTab === 'all' || item.category === activeTab;
                const matchesSearch = item.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      item.description.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesTab && matchesSearch;
            });

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    {/* الهيدر */}
                    <header class="border-b border-[#3a506b]/20 bg-[#0b132b]/80 backdrop-blur sticky top-0 z-50 px-4 py-4">
                        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#48cae4] to-[#1c2541] flex items-center justify-center border border-[#48cae4]/30">
                                    <span class="font-bold text-lg text-white">B</span>
                                </div>
                                <div>
                                    <h1 class="font-bold text-lg text-white tracking-wide">Bassam Ibrahim</h1>
                                    <p class="text-xs text-[#48cae4]">Civil Engineering & Tech Portfolio</p>
                                </div>
                            </div>
                            
                            {/* روابط التواصل */}
                            <div class="flex items-center gap-4 text-gray-300">
                                <a href="#" class="hover:text-[#48cae4] transition-colors"><i class="fab fa-telegram text-xl"></i></a>
                                <a href="#" class="hover:text-[#48cae4] transition-colors"><i class="fab fa-linkedin text-xl"></i></a>
                                <a href="#" class="hover:text-[#48cae4] transition-colors"><i class="fab fa-github text-xl"></i></a>
                            </div>
                        </div>
                    </header>

                    {/* المحتوى الرئيسي */}
                    <main class="max-w-6xl w-full mx-auto px-4 py-12 flex-grow">
                        {/* قسم الترحيب */}
                        <section class="text-center mb-16">
                            <h2 class="text-4xl font-extrabold mb-4 bg-gradient-to-r from-white via-gray-200 to-[#48cae4] bg-clip-text text-transparent">
                                توثيق الأبحاث، الابتكار التقني، والأصالة التاريخية
                            </h2>
                            <p class="max-w-2xl mx-auto text-gray-300 text-base leading-relaxed">
                                منصة متكاملة تجمع بين الهندسة الإنشائية، الحلول البرمجية الذكية، والحفاظ على الإرث الثقافي والهوية البصرية.
                            </p>
                        </section>

                        {/* أدوات التصفية والبحث */}
                        <div class="flex flex-col md:flex-row gap-4 items-center justify-between mb-8 bg-[#1c2541]/40 p-4 rounded-xl border border-[#3a506b]/20">
                            <div class="flex flex-wrap gap-2 w-full md:w-auto justify-center">
                                <button 
                                    onClick={() => setActiveTab('all')}
                                    class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'all' ? 'bg-[#48cae4] text-[#0b132b]' : 'bg-[#1c2541] text-gray-300 hover:bg-[#3a506b]'}`}
                                >
                                    الكل
                                </button>
                                <button 
                                    onClick={() => setActiveTab('research')}
                                    class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'research' ? 'bg-[#48cae4] text-[#0b132b]' : 'bg-[#1c2541] text-gray-300 hover:bg-[#3a506b]'}`}
                                >
                                    الأبحاث الإنشائية
                                </button>
                                <button 
                                    onClick={() => setActiveTab('tech')}
                                    class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'tech' ? 'bg-[#48cae4] text-[#0b132b]' : 'bg-[#1c2541] text-gray-300 hover:bg-[#3a506b]'}`}
                                >
                                    الأنظمة والتقنية
                                </button>
                                <button 
                                    onClick={() => setActiveTab('design')}
                                    class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'design' ? 'bg-[#48cae4] text-[#0b132b]' : 'bg-[#1c2541] text-gray-300 hover:bg-[#3a506b]'}`}
                                >
                                    الهوية والتصميم
                                </button>
                            </div>

                            {/* حقل البحث */}
                            <div class="relative w-full md:w-72">
                                <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-4xl">
                                    <i class="fas fa-search"></i>
                                </span>
                                <input 
                                    type="text"
                                    placeholder="ابحث عن مشروع أو بحث..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    class="w-full pl-4 pr-10 py-2 bg-[#0b132b] border border-[#3a506b]/40 rounded-lg text-white placeholder-gray-5xl focus:outline-none focus:border-[#48cae4] text-sm transition-colors"
                                />
                            </div>
                        </div>

                        {/* شبكة المشاريع */}
                        {filteredItems.length > 0 ? (
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredItems.map(item => (
                                    <Card key={item.id} {...item} />
                                ))}
                            </div>
                        ) : (
                            <div class="text-center py-12 text-gray-4xl">
                                <i class="fas fa-folder-open text-4xl mb-3 block"></i>
                                <p>لم يتم العثور على نتائج تطابق خيارات البحث.</p>
                            </div>
                        )}
                    </main>

                    {/* الفوتر */}
                    <footer class="border-t border-[#3a506b]/20 bg-[#0b132b] py-6 text-center text-xs text-gray-4xl">
                        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <p>© 2026 Bassam Ibrahim. جميع الحقوق محفوظة.</p>
                            <p class="flex items-center gap-1">
                                صُنع بكل فخر لتوثيق المعرفة والإرث <i class="fas fa-heart text-red-500"></i>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        // رندر التطبيق في عنصر الـ root بعد التأكد من جاهزية البيئة
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<Portfolio />);
        } catch (error) {
            console.error("React Rendering Error:", error);
            document.getElementById('root').innerHTML = `
                <div class="flex items-center justify-center min-h-screen bg-[#0b132b] text-white p-4 text-center">
                    <div class="bg-[#1c2541] p-6 rounded-xl border border-red-500/30 max-w-md">
                        <i class="fas fa-exclamation-triangle text-3xl text-red-500 mb-3"></i>
                        <h3 class="text-lg font-bold mb-2">عذراً، حدث خطأ أثناء تشغيل الواجهة</h3>
                        <p class="text-xs text-gray-300">برجاء مراجعة الـ Console الخاص بالمتصفح لمعرفة التفاصيل.</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
