    /* ── Keyframe Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    .anim-fade-up { animation: fadeUp 0.75s ease both; }
    .delay-1 { animation-delay: 0.10s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.40s; }
    .delay-4 { animation-delay: 0.55s; }
    .delay-5 { animation-delay: 0.70s; }

    .pulse-dot { animation: pulseGlow 2.2s ease-in-out infinite; }

    .scroll-line {
      animation: scrollLine 2s ease-in-out infinite;
    }

    /* ── Gradient text helper ── */
    .grad-text {
      background: linear-gradient(135deg, #3B9EFF, #60CFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Card hover (JS-driven via inline styles, but base transitions here) ── */
    .card-wrap {
      transition: transform 0.45s ease, box-shadow 0.45s ease,
                  border-color 0.45s ease, background 0.45s ease;
    }
    .card-top-line {
      transition: background 0.45s ease;
    }
    .card-icon-box {
      transition: background 0.35s ease, border-color 0.35s ease;
    }
    .card-cta {
      transition: color 0.3s ease;
    }
    .card-cta-arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    .card-tag {
      transition: color 0.3s ease, background 0.3s ease, border-color 0.3s ease;
    }

    /** Counter that animates from 0 when scrolled into view */
    function AnimatedNumber({ target, duration = 1500 }) {
      const [val, setVal] = useState(0);
      const ref = useRef(null);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (!entry.isIntersecting) return;
          observer.disconnect();
          let start = null;
          const step = (ts) => {
            if (!start) start = ts;
            const p = Math.min((ts - start) / duration, 1);
            setVal(Math.floor(p * target));
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [target, duration]);
      return <span ref={ref}>{val}</span>;
    }

                  <a key={item} href="#" className="nav-link"
                     style={{ fontSize:13, color:"#6677aa", textDecoration:"none" }}>
                    {item}
                  </a>
                ))}
              </nav>

              {/* CTA */}
              <button className="nav-cta" style={{
                fontSize:12, padding:"8px 18px", borderRadius:8, fontWeight:700,
                cursor:"pointer", fontFamily:"inherit",
              }}>
                تواصل معي
              </button>
            </div>
          </header>

          {/* ── HERO ── */}
          <section style={{
            position:"relative", minHeight:"100vh",
            display:"flex", flexDirection:"column",
            alignItems:"center", justifyContent:"center",
            padding:"80px 24px 40px",
            textAlign:"center",
            zIndex:1,
          }}>
            {/* Horizontal decorative lines */}
            <div style={{
              position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none",
            }}>
              <div style={{
                position:"absolute", top:"50%", right:0,
                width:"30%", height:1,
                background:"linear-gradient(to left, transparent, rgba(59,158,255,0.25))",
              }}/>
              <div style={{
                position:"absolute", top:"50%", left:0,
                width:"30%", height:1,
                background:"linear-gradient(to right, transparent, rgba(59,158,255,0.25))",
              }}/>
            </div>

            {/* Badge */}
            <div className="anim-fade-up delay-1"
                 style={{ display:"flex", alignItems:"center", gap:8, marginBottom:24 }}>
              <div className="pulse-dot" style={{
                width:6, height:6, borderRadius:"50%", background:"#3B9EFF",
              }}/>
              <span style={{
                fontSize:11, color:"#3B9EFF",
                letterSpacing:"0.3em", textTransform:"uppercase", fontWeight:600,
              }}>
                مهندس · محلل سياسي · خبير منظمات
              </span>
              <div className="pulse-dot" style={{
                width:6, height:6, borderRadius:"50%", background:"#3B9EFF",
              }}/>
            </div>

            {/* Headline */}
            <h1 className="anim-fade-up delay-2" style={{
              fontSize:"clamp(2.4rem,7vw,4.8rem)",
              fontWeight:900, lineHeight:1.15, marginBottom:20,
              letterSpacing:"-0.02em",
            }}>
              <span style={{ color:"#ffffff" }}>بسام </span>
              <span className="grad-text">إبراهيم</span>
            </h1>

            {/* Sub */}
            <p className="anim-fade-up delay-3" style={{
              color:"#6677aa", maxWidth:520, lineHeight:1.9,
              fontSize:15, marginBottom:36,
            }}>
              منصة متكاملة تجمع بين الدقة الهندسية، العمق السياسي،<br/>
              ريادة التنمية البشرية، وفلسفة الحياة الصحية.
            </p>

            {/* Buttons */}
            <div className="anim-fade-up delay-4"
                 style={{ display:"flex", gap:16, flexWrap:"wrap", justifyContent:"center" }}>
              <button className="btn-primary" style={{
                padding:"12px 32px", borderRadius:12,
                background:"linear-gradient(135deg,#3B9EFF,#1a7fe0)",
                boxShadow:"0 0 30px rgba(59,158,255,0.4)",
                color:"#fff", fontWeight:700, fontSize:13,
                border:"none", cursor:"pointer", fontFamily:"inherit",
              }}>
                استكشف المحتوى
              </button>
              <button className="btn-outline" style={{
                padding:"12px 32px", borderRadius:12,
                background:"transparent",
                fontWeight:700, fontSize:13,
                cursor:"pointer", fontFamily:"inherit",
              }}>
                تعرّف عليّ
              </button>
            </div>

            {/* Stats */}
            <div className="anim-fade-up delay-5" style={{
              marginTop:72,
              display:"flex", flexWrap:"wrap", gap:48, justifyContent:"center",
            }}>
              {STATS.map(s => (
                <div key={s.label} style={{ textAlign:"center" }}>
                  <div style={{ fontSize:30, fontWeight:900, color:"#3B9EFF", marginBottom:4 }}>
                    <AnimatedNumber target={s.value}/>{s.suffix}
                  </div>
                  <div style={{ fontSize:11, color:"#445566", letterSpacing:"0.15em" }}>
                    {s.label}
                  </div>
                </div>
              ))}
            </div>

            {/* Scroll indicator */}
            <div style={{
              position:"absolute", bottom:32, left:"50%", transform:"translateX(-50%)",
              display:"flex", flexDirection:"column", alignItems:"center", gap:6,
              opacity:0.28,
            }}>
              <div className="scroll-line" style={{
                width:1, height:44,
                background:"linear-gradient(to bottom, transparent, #3B9EFF)",
              }}/>
              <span style={{ fontSize:9, letterSpacing:"0.25em", color:"#3B9EFF" }}>SCROLL</span>
            </div>
          </section>

          {/* ── CARDS SECTION ── */}
          <section style={{ position:"relative", padding:"80px 24px", zIndex:1 }}>
            <div style={{ maxWidth:1100, margin:"0 auto" }}>
              {/* Section header */}
              <div style={{ textAlign:"center", marginBottom:56 }}>
                <p style={{
                  fontSize:10, letterSpacing:"0.4em", color:"#3B9EFF",
                  textTransform:"uppercase", marginBottom:10, fontWeight:600,
                }}>
                  المحاور الرئيسية
                </p>
                <h2 style={{ fontSize:28, fontWeight:900, color:"#fff" }}>
                  أربعة مجالات. رؤية واحدة.
                </h2>
                <div style={{
                  margin:"14px auto 0", width:60, height:2,
                  background:"linear-gradient(to left, transparent, #3B9EFF, transparent)",
                }}/>
              </div>

              {/* 2-column grid */}
              <div style={{
                display:"grid",
                gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",
                gap:22,
              }}>
                {CARDS.map(card => <Card key={card.id} card={card} />)}
              </div>
            </div>
          </section>

          {/* ── VISION STRIP ── */}
          <section style={{ position:"relative", padding:"60px 24px", zIndex:1 }}>
            <div style={{ maxWidth:860, margin:"0 auto" }}>
              <div style={{
                borderRadius:20, padding:"48px 40px",
                textAlign:"center", position:"relative", overflow:"hidden",
                background:"linear-gradient(135deg,rgba(59,158,255,0.08),rgba(96,207,255,0.04))",
                border:"1px solid rgba(59,158,255,0.15)",
              }}>
                {/* top glow line */}
                <div style={{
                  position:"absolute", top:0, left:0, right:0, height:1,
                  background:"linear-gradient(to left, transparent, rgba(59,158,255,0.5), transparent)",
                }}/>
                <div style={{ fontSize:44, marginBottom:14 }}>⬡</div>
                <h3 style={{ fontSize:22, fontWeight:700, color:"#fff", marginBottom:14 }}>
                  الرؤية والرسالة
                </h3>
                <p style={{ color:"#6677aa", lineHeight:1.9, maxWidth:580, margin:"0 auto", fontSize:14 }}>
                  أؤمن بأن التخصص الحقيقي لا يُقيّد صاحبه، بل يمنحه مفاتيح لفهم العالم بطرق متعددة.
                  هذه المنصة تعكس مسيرتي في بناء جسور معرفية بين الهندسة والسياسة والإنسان.
                </p>
              </div>
            </div>
          </section>

          {/* ── FOOTER ── */}
          <footer style={{
            position:"relative", zIndex:1,
            padding:"48px 24px 32px",
            borderTop:"1px solid rgba(59,158,255,0.1)",
          }}>
            <div style={{ maxWidth:860, margin:"0 auto" }}>
              {/* Social heading */}
              <div style={{ textAlign:"center", marginBottom:28 }}>
                <p style={{
                  fontSize:10, letterSpacing:"0.4em", color:"#3B9EFF",
                  textTransform:"uppercase", marginBottom:20, fontWeight:600,
                }}>
                  تواصل معي
                </p>
                <div style={{ display:"flex", justifyContent:"center", gap:16, flexWrap:"wrap" }}>
                  {SOCIALS.map(s => <SocialIcon key={s.name} social={s} />)}
                </div>
              </div>

              {/* Divider */}
              <div style={{
                width:"100%", height:1, margin:"28px 0",
                background:"linear-gradient(to left, transparent, rgba(59,158,255,0.2), transparent)",
              }}/>

              {/* Bottom row */}
              <div className="footer-row" style={{
                display:"flex", alignItems:"center",
                justifyContent:"space-between", gap:12, flexWrap:"wrap",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <div style={{
                    width:30, height:30, borderRadius:8,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    background:"linear-gradient(135deg,#3B9EFF,#60CFFF)",
                    fontSize:10, fontWeight:900, color:"#080c12",
                  }}>ب.إ</div>
                  <span style={{ fontWeight:700, color:"#fff", fontSize:13 }}>بسام إبراهيم</span>
                  <span style={{ color:"#334455", fontSize:12 }}>·</span>
                  <span style={{ color:"#445566", fontSize:12 }}>مهندس · محلل سياسي · خبير منظمات</span>
                </div>
                <p style={{ fontSize:11, color:"#334455" }}>© 2025 · جميع الحقوق محفوظة</p>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    /* ════════════════════════════════
       MOUNT
    ════════════════════════════════ */
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
