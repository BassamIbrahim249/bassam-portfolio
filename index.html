<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bassam Ibrahim — Engineering Researcher & Analyst</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #080c12;
      font-family: 'Cairo', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes scrollLine { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 51% { transform: scaleY(1); transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }

    .anim-fade-up { animation: fadeUp 0.75s ease both; }
    .delay-1 { animation-delay: 0.10s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.40s; }
    .delay-4 { animation-delay: 0.55s; }
    .delay-5 { animation-delay: 0.70s; }
    .pulse-dot { animation: pulseGlow 2.2s ease-in-out infinite; }
    .scroll-line { animation: scrollLine 2s ease-in-out infinite; }
    .grad-text { background: linear-gradient(135deg, #3B9EFF, #60CFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    
    .card-wrap { transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease, background 0.45s ease; }
    .btn-primary { transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .btn-primary:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(59,158,255,0.45); }
    .btn-outline { border: 1px solid rgba(59,158,255,0.3); color: #8899bb; transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease; }
    .btn-outline:hover { border-color: rgba(59,158,255,0.7); color: #3B9EFF; transform: scale(1.04); }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CARDS = [
      {
        id: "engineering",
        title: "المنصة الهندسية",
        subtitle: "علوم المواد وابتكارات الإنشاء",
        desc: "بوابة إلى عالم المواد الإنشائية المتقدمة — من تحليل الخصائص الفيزيائية والكيميائية، إلى أحدث ابتكارات تقنيات البناء المستدامة.",
        tags: ["علوم المواد", "ابتكار إنشائي", "مختبر هندسي"],
        accent: "#3B9EFF",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width:40,height:40}}>
            <polygon points="20,4 36,30 4,30" stroke="#3B9EFF" strokeWidth="1.5" fill="none"/>
            <polygon points="20,10 30,26 10,26" stroke="#3B9EFF" strokeWidth="0.8" fill="none" opacity="0.4"/>
          </svg>
        ),
      },
      {
        id: "political",
        title: "الأرشيف السياسي",
        subtitle: "التحليل الاستراتيجي والرؤى الفكرية",
        desc: "قراءات معمّقة في المشهد السوداني والدولي، مع التركيز على التحليل الاستراتيجي والرؤى الفكرية التي تستشرف المستقبل.",
        tags: ["تحليل استراتيجي", "رؤى فكرية", "تاريخ"],
        accent: "#60CFFF",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width:40,height:40}}>
            <rect x="6" y="6" width="28" height="28" rx="2" stroke="#60CFFF" strokeWidth="1.5" fill="none"/>
            <circle cx="20" cy="20" r="4" stroke="#60CFFF" strokeWidth="1.2" fill="none"/>
          </svg>
        ),
      },
      {
        id: "academy",
        title: "أكاديمية المنظمات",
        subtitle: "كتابة المشاريع والقيادة التنموية",
        desc: "إتقان كتابة المنح الدولية وتطوير مهارات القيادة الفاعلة وبرامج التدريب التي تهدف لإحداث تغيير مجتمعي ملموس.",
        tags: ["كتابة مشاريع", "قيادة", "تدريب"],
        accent: "#A78BFA",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width:40,height:40}}>
            <circle cx="20" cy="20" r="14" stroke="#A78BFA" strokeWidth="1.5" fill="none"/>
            <circle cx="20" cy="20" r="2" fill="#A78BFA"/>
          </svg>
        ),
      },
      {
        id: "lifestyle",
        title: "نمط الحياة والرياضة",
        subtitle: "الصحة الشاملة والتميز البدني",
        desc: "منهجية علمية تجمع بين الصحة الجسدية والذهنية، مع بروتوكولات تغذية دقيقة لتعزيز الأداء القيادي والتميز البدني.",
        tags: ["صحة شاملة", "تغذية علمية", "رياضة"],
        accent: "#34D399",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width:40,height:40}}>
            <path d="M20 8 C20 8 8 16 8 24 C8 30 13.5 34 20 34 C26.5 34 32 30 32 24 C32 16 20 8 20 8Z" stroke="#34D399" strokeWidth="1.5" fill="none"/>
          </svg>
        ),
      },
    ];

    const SOCIALS = [
      { name: "LinkedIn", href: "#", color: "#0A66C2" },
      { name: "WhatsApp", href: "#", color: "#25D366" },
      { name: "Facebook", href: "#", color: "#1877F2" },
      { name: "X", href: "#", color: "#E7E9EA" }
    ];

    const STATS = [
      { label: "بحث ومقال", value: 150, suffix: "+" },
      { label: "مشروع هندسي", value: 80, suffix: "+" },
      { label: "دورة تدريبية", value: 40, suffix: "+" }
    ];

    function GridBackground() {
      return (
        <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:0 }}>
          <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:700, height:400, background:"rgba(59,158,255,0.05)", filter:"blur(120px)" }}/>
        </div>
      );
    }

    function AnimatedNumber({ target }) {
      const [val, setVal] = useState(0);
      const ref = useRef(null);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (!entry.isIntersecting) return;
          let start = null;
          const step = (ts) => {
            if (!start) start = ts;
            const p = Math.min((ts - start) / 1000, 1);
            setVal(Math.floor(p * target));
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [target]);
      return <span ref={ref}>{val}</span>;
    }

    function App() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      return (
        <div style={{ minHeight:"100vh", position:"relative" }}>
          <GridBackground />

          {/* Navbar */}
          <header style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, background: scrolled ? "rgba(8,12,18,0.92)" : "transparent", backdropFilter: scrolled ? "blur(20px)" : "none", borderBottom: scrolled ? "1px solid rgba(59,158,255,0.1)" : "none" }}>
            <div style={{ maxWidth:1100, margin:"0 auto", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ fontWeight:900, color:"#fff", fontSize:18, letterSpacing:"0.05em" }}>BASSAM IBRAHIM</div>
              <nav className="hidden md:flex gap-8 text-xs font-bold text-gray-500 uppercase tracking-widest">
                <a href="#" className="hover:text-blue-400">Engineering</a>
                <a href="#" className="hover:text-blue-400">Strategy</a>
                <a href="#" className="hover:text-blue-400">Academy</a>
              </nav>
              <button style={{ background:"rgba(59,158,255,0.1)", border:"1px solid #3B9EFF", color:"#3B9EFF", padding:"8px 20px", borderRadius:8, fontWeight:700, fontSize:12 }}>Contact</button>
            </div>
          </header>

          {/* Hero */}
          <section style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 24px" }}>
            <div className="anim-fade-up delay-1" style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
              <div className="pulse-dot" style={{ width:6, height:6, borderRadius:"50%", background:"#3B9EFF" }}/>
              <span style={{ fontSize:10, color:"#3B9EFF", letterSpacing:"0.4em", fontWeight:700 }}>RESEARCHER & ANALYST</span>
            </div>
            <h1 className="anim-fade-up delay-2" style={{ fontSize:"clamp(3rem, 10vw, 5.5rem)", fontWeight:900, marginBottom:20 }}>
              Bassam <span className="grad-text">Ibrahim</span>
            </h1>
            <p className="anim-fade-up delay-3" style={{ color:"#6677aa", maxWidth:600, lineHeight:1.8, fontSize:17 }}>
              مهندس باحث متخصص في علوم المواد، أدمج الدقة الهندسية مع عمق التحليل الاستراتيجي لبناء رؤى مبتكرة في مجالات الهندسة والسياسة والتنمية.
            </p>
            
            <div className="anim-fade-up delay-4" style={{ marginTop:40, display:"flex", gap:15 }}>
              <button className="btn-primary" style={{ padding:"14px 35px", borderRadius:12, background:"#3B9EFF", color:"#fff", fontWeight:700, border:"none" }}>استكشف الأبحاث</button>
              <button className="btn-outline" style={{ padding:"14px 35px", borderRadius:12, background:"transparent", fontWeight:700 }}>السيرة الذاتية</button>
            </div>

            <div className="anim-fade-up delay-5" style={{ marginTop:80, display:"flex", gap:50 }}>
              {STATS.map(s => (
                <div key={s.label}>
                  <div style={{ fontSize:32, fontWeight:900, color:"#3B9EFF" }}><AnimatedNumber target={s.value}/>{s.suffix}</div>
                  <div style={{ fontSize:10, color:"#445566", letterSpacing:"0.2em", marginTop:5 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </section>

          {/* Cards Section */}
          <section style={{ padding:"100px 24px", maxWidth:1100, margin:"0 auto" }}>
             <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:25 }}>
                {CARDS.map(card => (
                  <div key={card.id} className="card-wrap p-8 rounded-2xl border border-gray-800/50 bg-gray-900/30 hover:border-blue-500/50">
                    <div style={{ color:card.accent, marginBottom:20 }}>{card.icon}</div>
                    <h3 style={{ fontSize:20, fontWeight:700, marginBottom:10 }}>{card.title}</h3>
                    <p style={{ color:"#6677aa", fontSize:14, lineHeight:1.7 }}>{card.desc}</p>
                  </div>
                ))}
             </div>
          </section>

          {/* Footer */}
          <footer style={{ padding:60, textAlign:"center", borderTop:"1px solid rgba(59,158,255,0.1)" }}>
             <div style={{ display:"flex", justifyContent:"center", gap:30, marginBottom:30 }}>
                {SOCIALS.map(s => (
                  <a key={s.name} href="#" style={{ color:"#445566", fontWeight:700, fontSize:12, letterSpacing:"0.1em" }}>{s.name}</a>
                ))}
             </div>
             <p style={{ color:"#334455", fontSize:11 }}>© 2026 Bassam Ibrahim. Crafted with Engineering Precision.</p>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
