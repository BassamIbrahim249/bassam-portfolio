**بسام إبراهيم أحمد محمد** — مهندس مدني، ناشط مجتمعي، مهتم بالتاريخ السوداني والحضارة النوبية والابتكار الهندسي وبناء السلام وتمكين الإنسان.

---

## عن المنصة

**BassamIbrahim Portfolio** هو مشروع معرفي سوداني مستقل وغير ربحي، يُعنى بالتوثيق والتحليل وبناء المحتوى الهادف. وُلد من إيمان عميق بأن نهضة المجتمعات تبدأ من وعيها، وأن بناء الإنسان يسبق بناء العمران.

ليست هذه المنصة موقعاً لنقل الأخبار اليومية أو استهلاك المحتوى السريع، بل هي مشروع فكري طويل المدى يسعى إلى بناء أرشيف رقمي رصين، يخدم القارئ اليوم ويظل مرجعاً موثوقاً للأجيال القادمة. ندفع نحو الفهم لا التلقي، ونحفز على التفكير والنقد لا الحفظ والجمود.

## مجالاتنا

🏗️ **الهندسة والابتكار:** تبسيط المعرفة الهندسية وربطها بالتطبيقات العملية والحلول الملائمة للواقع المحلي.

🏛️ **السياسة والتاريخ السوداني:** قراءة تحولات السودان بعقل تحليلي هادئ، لفهم الماضي واستيعاب الحاضر بعيداً عن الاستقطاب.

🏺 **الحضارة النوبية:** توثيق التاريخ والآثار النوبية وإبراز دورها في تشكيل الإرث الإنساني للمنطقة.

📚 **أكاديمية التدريب والتطوير:** بناء قدرات الفرد وتعزيز ثقافة المبادرة والتطوير الذاتي، إيماناً بأن بناء المؤسسات يبدأ ببناء الفرد.

🌿 **نمط الحياة والصحة:** نشر ثقافة التغذية السليمة والنشاط البدني والعادات الصحية لتأسيس أسلوب حياة متوازن قائم على العلم.

تقديم معرفة رصينة ومتاحة، تسهم في صياغة الوعي وتبسيط العلوم وتوثيق التاريخ، لتمكين الأفراد من الفهم والتحليل واتخاذ القرار لبناء مجتمع أفضل.
---

## رؤيتنا

أن تصبح المنصة المرجع المعرفي السوداني الموثوق في حفظ الذاكرة الوطنية ونشر المعرفة، ودعم جيل جديد من الباحثين والمهندسين والمفكرين وصناع التغيير.

    function TypeWriter({texts,color='#3B9EFF'}){

    function WelcomeInstallPopup({lang}){
      const[show,setShow]=useState(false);const[deferredPrompt,setDeferredPrompt]=useState(null);const[isInstalled,setIsInstalled]=useState(false);
      const t=k=>I18N[lang]?.[k]||k;const DISMISS_KEY='pwa_dismiss_data';const DISMISS_DAYS=5;
      useEffect(()=>{
        if(window.matchMedia('(display-mode: standalone)').matches){setIsInstalled(true);return;}
        const handler=e=>{e.preventDefault();setDeferredPrompt(e);};window.addEventListener("beforeinstallprompt",handler);
        const raw=localStorage.getItem(DISMISS_KEY);let dismissData=null;if(raw){try{dismissData=JSON.parse(raw);}catch(e){}}
        const shouldShow=()=>{if(!dismissData)return true;const{count,timestamp}=dismissData;const now=Date.now();const days=DISMISS_DAYS*24*60*60*1000;if(count<2)return true;if(now-timestamp<days)return false;localStorage.removeItem(DISMISS_KEY);return true;};
        if(shouldShow()){const timer=setTimeout(()=>setShow(true),5000);return()=>{clearTimeout(timer);window.removeEventListener("beforeinstallprompt",handler);};}
        return()=>window.removeEventListener("beforeinstallprompt",handler);
      },[]);
      const handleInstall=async()=>{if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;setDeferredPrompt(null);setShow(false);if(outcome==="accepted"){localStorage.removeItem(DISMISS_KEY);setIsInstalled(true);}}else alert("للتثبيت:\n• أندرويد: ⁝ ← 'إضافة إلى الشاشة الرئيسية'\n• آيفون: ↑ ← 'إضافة إلى الشاشة الرئيسية'");};

      return(

            <p style={{fontSize:13,color:"#8899bb",lineHeight:1.9,marginBottom:24}}>{t('pwa_desc')}</p>

            <button onClick={handleDismiss} className="dismiss-btn">{t('pwa_dismiss')}</button>
