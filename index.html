            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24}}>
              <span style={{fontWeight:900, fontSize:18, color:'var(--text-primary)'}}>القائمة</span>
              <button onClick={()=>setMobileMenuOpen(false)} style={{background:'none', border:'none', color:'var(--text-secondary)', fontSize:24, cursor:'pointer'}}>✕</button>
            </div>
            {NAV_ITEMS.map(item=>(
              <a key={item.id} href={`#${item.id}`} onClick={e=>{e.preventDefault();handleMobileNav(item.id);}}>
                {t(item.key)}
              </a>
            ))}
            <div style={{marginTop:16, paddingTop:16, borderTop:'1px solid var(--border-color)'}}>
              <a href={`https://wa.me/${CONFIG.contact.whatsapp}`} target="_blank" rel="noopener noreferrer" style={{color:'#25D366'}}>
                💬 {t('nav_contact')}
              </a>
            </div>
          </div>

          {/* ── Hero ── */}
          <section style={{padding:'150px 20px 70px',textAlign:'center',maxWidth:960,margin:'0 auto',position:'relative',zIndex:1}}>
            <div className="anim-fade-up delay-1 section-title">{t('identity')}</div>
            <div style={{position:'relative',display:'inline-block',marginBottom:18}}>
              {theme==='dark'&&<div style={{position:'absolute',inset:'-40px -60px',background:'radial-gradient(ellipse,rgba(59,158,255,0.12) 0%,transparent 70%)',borderRadius:'50%',pointerEvents:'none',animation:'heroOrb 5s ease-in-out infinite'}}/>}
              <h1 className="anim-fade-up delay-2" style={{fontSize:'clamp(2rem,8vw,4.5rem)',fontWeight:900,lineHeight:1.1,color:'var(--text-primary)',position:'relative'}}>
                Bassam<span style={{background:'linear-gradient(135deg,#3B9EFF,#60CFFF)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Ibrahim</span>
              </h1>
            </div>
            <div className="anim-fade-up delay-3" style={{fontSize:'clamp(0.9rem,3vw,1.3rem)',marginBottom:16,minHeight:'2rem'}}>
              <TypeWriter texts={TW_TEXTS} color="#3B9EFF"/>
            </div>
            <p className="anim-fade-up delay-3" style={{color:'var(--text-secondary)',maxWidth:620,margin:'0 auto 40px',fontSize:'0.95rem',lineHeight:1.85,padding:'0 10px'}}>{t('heroDesc')}</p>
            <div className="anim-fade-up delay-4" style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap',marginBottom:56}}>
              <button onClick={()=>scrollTo('vision-section')}
                style={{padding:'12px 28px',borderRadius:14,background:'linear-gradient(135deg,#3B9EFF,#1a7fe0)',color:'#fff',fontWeight:700,fontSize:14,border:'none',cursor:'pointer',fontFamily:'Cairo',boxShadow:'0 0 25px rgba(59,158,255,0.5)',transition:'all 0.2s'}}>
                {t('hero_btn1')}
              </button>
              <button onClick={()=>scrollTo('cards-section')} className="glass-card"
                style={{padding:'12px 28px',borderRadius:14,color:'var(--text-secondary)',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'Cairo'}}>
                {t('hero_btn2')}
              </button>
            </div>
            <div className="anim-fade-up delay-5" style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
              {STATS.map(s=>(
                <div key={s.label} className="glass-card"
                  style={{padding:'20px 24px',borderRadius:16,textAlign:'center',minWidth:130,transition:'all 0.3s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-6px)';e.currentTarget.style.borderColor=s.color+'66';e.currentTarget.style.boxShadow=`0 0 30px ${s.color}22`;}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.borderColor='var(--glass-border)';e.currentTarget.style.boxShadow='none';}}>
                  <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:'var(--text-primary)'}}>{s.label}</div>
                  <div style={{fontSize:10,color:s.color,fontWeight:600}}>{s.sublabel}</div>
                </div>
              ))}
            </div>
          </section>

          {/* ── Cards ── */}
          <section id="cards-section" style={{padding:'60px 20px 80px',position:'relative',zIndex:1}}>
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <div style={{textAlign:'center',marginBottom:52}}>
                <div className="section-title">{t('browse')}</div>
                <h2 style={{fontSize:'clamp(1.5rem,4vw,2.2rem)',fontWeight:900,marginTop:8,color:'var(--text-primary)'}}>{t('mainTitle')}</h2>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}}>
                {CARDS.map(card=><Card key={card.id} card={card} onTagClick={handleTagClick} onLibraryClick={handleLibraryClick} lang={lang}/>)}
              </div>
            </div>
          </section>

          {/* ── Vision ── */}
          <section id="vision-section" style={{padding:'40px 20px 80px',position:'relative',zIndex:1}}>
            {theme==='dark'&&<div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',width:600,height:300,background:'radial-gradient(ellipse,rgba(234,179,8,0.06) 0%,transparent 70%)',pointerEvents:'none',borderRadius:'50%'}}/>}
            <div className="glass-card vision-card" style={{maxWidth:820,margin:'0 auto',borderRadius:26,padding:'44px 36px',textAlign:'center',position:'relative'}}>
              <div style={{width:60,height:60,borderRadius:18,background:'rgba(234,179,8,0.12)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:28,color:'#EAB308',border:'1px solid rgba(234,179,8,0.25)',boxShadow:'0 0 25px rgba(234,179,8,0.2)'}}>⬡</div>
              <h3 style={{fontSize:22,fontWeight:900,marginBottom:16,background:'linear-gradient(135deg,#3B9EFF,#60CFFF)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{t('visionTitle')}</h3>
              <p style={{color:'var(--text-secondary)',lineHeight:1.9,fontSize:14,maxWidth:560,margin:'0 auto'}}>{t('visionText')}</p>
            </div>
          </section>

          {/* ── Footer ── */}
          <footer style={{padding:'40px 20px 32px',borderTop:'1px solid var(--glass-border)',position:'relative',zIndex:1}}>
            {theme==='dark'&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:'80%',height:1,background:'linear-gradient(90deg,transparent,rgba(59,158,255,0.3),transparent)',pointerEvents:'none'}}/>}
            <div style={{maxWidth:860,margin:'0 auto',textAlign:'center'}}>
              <p style={{fontSize:12,letterSpacing:'0.3em',color:'var(--accent-blue)',marginBottom:22,fontWeight:700}}>{t('contact')}</p>
              <div style={{display:'flex',justifyContent:'center',gap:14,flexWrap:'wrap',marginBottom:30}}>
                {SOCIALS.map(s=><SocialIcon key={s.name} social={s}/>)}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:24,borderTop:'1px solid var(--glass-border)'}}>
                <span style={{fontWeight:900,fontSize:16,background:'linear-gradient(135deg,#3B9EFF,#60CFFF)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>BassamIbrahim</span>
                <span style={{fontSize:11,color:'var(--text-secondary)'}}>© {new Date().getFullYear()} · {t('footerCopy')}</span>
              </div>
            </div>
          </footer>

          <WelcomeInstallPopup lang={lang}/>
          <ProgressRing/>

          {/* أنماط CSS إضافية للموبايل داخل JSX */}
          <style>{`
            @media (max-width: 768px) {
              .header-contact-btn { display: none !important; }
              .mobile-contact-btn { display: flex !important; }
              .navbar-container { justify-content: space-between; }
            }
            @media (min-width: 769px) {
              .mobile-contact-btn { display: none !important; }
            }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script data-goatcounter="https://bassam-portfolio.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
