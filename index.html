<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BassamIbrahim — مهندس باحث · محلل استراتيجي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background: #080c12;
      font-family: 'Cairo', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
    }
    @keyframes scrollLine {
      0% {
        transform: scaleY(0);
        transform-origin: top;
      }
      50% {
        transform: scaleY(1);
        transform-origin: top;
      }
      51% {
        transform: scaleY(1);
        transform-origin: bottom;
      }
      100% {
        transform: scaleY(0);
        transform-origin: bottom;
      }
    }
    .anim-fade-up {
      animation: fadeUp 0.75s ease both;
    }
    .delay-1 {
      animation-delay: 0.10s;
    }
    .delay-2 {
      animation-delay: 0.25s;
    }
    .delay-3 {
      animation-delay: 0.40s;
    }
    .delay-4 {
      animation-delay: 0.55s;
    }
    .delay-5 {
      animation-delay: 0.70s;
    }
    .pulse-dot {
      animation: pulseGlow 2.2s ease-in-out infinite;
    }
    .scroll-line {
      animation: scrollLine 2s ease-in-out infinite;
    }
    .grad-text {
      background: linear-gradient(135deg, #3B9EFF, #60CFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-wrap {
      transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease, background 0.45s ease;
    }
    .navbar {
      transition: background 0.35s ease, border-color 0.35s ease, backdrop-filter 0.35s ease;
    }
    .nav-link {
      transition: color 0.2s ease;
      text-decoration: none;
      color: #8899bb;
    }
    .nav-link:hover {
      color: #3B9EFF;
    }
    .nav-cta {
      background: linear-gradient(135deg, rgba(59,158,255,0.18), rgba(59,158,255,0.08));
      border: 1px solid rgba(59,158,255,0.45);
      color: #3B9EFF;
      transition: background 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }
    .nav-cta:hover {
      background: linear-gradient(135deg, rgba(59,158,255,0.28), rgba(59,158,255,0.15));
      box-shadow: 0 0 20px rgba(59,158,255,0.2);
    }
    .social-link {
      transition: transform 0.3s ease, color 0.3s ease;
      text-decoration: none;
    }
    .social-link:hover {
      transform: translateY(-3px);
    }
    @media (max-width: 768px) {
      .hide-mobile {
        display: none !important;
      }
      .footer-row {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CARDS = [
      {
        id: "engineering",
        title: "المنصة الهندسية",
        subtitle: "علوم المواد، ابتكارات الإنشاء والمختبر الهندسي",
        desc: "بوابة إلى عالم المواد الإنشائية المتقدمة — من تحليل الخصائص إلى أحدث ابتكارات تقنيات البناء ومنهجية المختبر.",
        tags: ["علوم المواد", "ابتكار إنشائي", "مختبر هندسي"],
        accent: "#3B9EFF",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width: 40, height: 40}}>
            <polygon points="20,4 36,30 4,30" stroke="#3B9EFF" strokeWidth="1.5" fill="none"/>
            <line x1="20" y1="4" x2="20" y2="30" stroke="#3B9EFF" strokeWidth="0.5" opacity="0.3"/>
          </svg>
        ),
      },
      {
        id: "political",
        title: "الأرشيف السياسي",
        subtitle: "تاريخ السودان، التحليل الاستراتيجي، ورؤى فكرية",
        desc: "قراءات تاريخية معمّقة، وتحليل استراتيجي للمشهد الراهن، ورؤى فكرية نقدية تُنير المسار.",
        tags: ["تاريخ السودان", "تحليل استراتيجي", "رؤى فكرية"],
        accent: "#60CFFF",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width: 40, height: 40}}>
            <rect x="6" y="6" width="28" height="28" rx="2" stroke="#60CFFF" strokeWidth="1.5" fill="none"/>
            <circle cx="20" cy="20" r="4" stroke="#60CFFF" strokeWidth="1.2" fill="none"/>
          </svg>
        ),
      },
      {
        id: "academy",
        title: "أكاديمية التطوير",
        subtitle: "كتابة المشاريع، مهارات القيادة، والتدريب",
        desc: "إتقان كتابة المشاريع والمنح الدولية، وتنمية مهارات القيادة وبرامج التدريب المؤسسي.",
        tags: ["كتابة مشاريع", "قيادة", "تدريب"],
        accent: "#A78BFA",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width: 40, height: 40}}>
            <circle cx="20" cy="20" r="14" stroke="#A78BFA" strokeWidth="1.5" fill="none"/>
            <circle cx="20" cy="20" r="2" fill="#A78BFA"/>
          </svg>
        ),
      },
      {
        id: "nubian",
        title: "نوبيان (الحضارة النوبية)",
        subtitle: "توثيق الإرث، التاريخ، والعمارة النوبية",
        desc: "نافذة متخصصة في تسليط الضوء على جذورنا التاريخية وهويتنا الحضارية العريقة.",
        tags: ["تاريخ", "آثار", "هوية"],
        accent: "#EAB308",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width: 40, height: 40}}>
            <path d="M20 5L35 32H5L20 5Z" stroke="#EAB308" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M13 18H27M10 25H30" stroke="#EAB308" strokeWidth="1.5"/>
          </svg>
        ),
      },
      {
        id: "lifestyle",
        title: "نمط الحياة والصحة",
        subtitle: "الصحة الشاملة، التغذية، والتميز البدني",
        desc: "منهجية متكاملة تجمع الصحة الجسدية والذهنية، وأنظمة تغذية علمية دقيقة لتعزيز الأداء.",
        tags: ["صحة شاملة", "تغذية", "تميز بدني"],
        accent: "#34D399",
        icon: (
          <svg viewBox="0 0 40 40" fill="none" style={{width: 40, height: 40}}>
            <path d="M20 8 C20 8 8 16 8 24 C8 30 13.5 34 20 34 C26.5 34 32 30 32 24 C32 16 20 8 20 8Z" stroke="#34D399" strokeWidth="1.5" fill="none"/>
          </svg>
        ),
      },
    ];

    const SOCIALS = [
      { name: "LinkedIn", href: "https://www.linkedin.com/in/bassam-ibrahim-785a01406", color: "#0A66C2" },
      { name: "Facebook", href: "https://www.facebook.com/bassam.ibrahim.ahmed", color: "#1877F2" },
      { name: "WhatsApp", href: "https://wa.me/249967238251", color: "#25D366" }
    ];

    function Card({ card }) {
      const [hover, setHover] = useState(false);
      return (
        <div 
          className="card-wrap" 
          onMouseEnter={() => setHover(true)} 
          onMouseLeave={() => setHover(false)}
          style={{
            background: hover ? "rgba(59,158,255,0.06)" : "rgba(255,255,255,0.02)",
            border: "1px solid",
            borderColor: hover ? card.accent : "rgba(255,255,255,0.06)",
            borderRadius: 20,
            padding: "32px 28px",
            transform: hover ? "translateY(-6px)" : "none",
            cursor: "pointer"
          }}
        >
          <div style={{ marginBottom: 20 }}>{card.icon}</div>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#ffffff", marginBottom: 8 }}>{card.title}</h3>
          <p style={{ fontSize: 12, color: card.accent, marginBottom: 12 }}>{card.subtitle}</p>
          <p style={{ fontSize: 13, color: "#8899bb", lineHeight: 1.6 }}>{card.desc}</p>
          <div style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
            {card.tags.map((tag, index) => (
              <span 
                key={index}
                style={{
                  fontSize: 10,
                  padding: "4px 10px",
                  borderRadius: 12,
                  background: `${card.accent}1a`,
                  color: card.accent,
                  border: `1px solid ${card.accent}33`
                }}
              >
                {tag}
              </span>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      return (
        <div>
          {/* Navbar */}
          <header 
            className="navbar" 
            style={{
              position: "fixed",
              top: 0,
              left: 0,
              right: 0,
              zIndex: 100,
              padding: "20px",
              background: scrolled ? "rgba(8,12,18,0.95)" : "transparent",
              backdropFilter: scrolled ? "blur(10px)" : "none",
              borderBottom: scrolled ? "1px solid rgba(59,158,255,0.1)" : "1px solid transparent"
            }}
          >
            <div style={{
              maxWidth: 1200,
              margin: "0 auto",
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}>
              <span style={{ fontWeight: 900, fontSize: 20, color: "#ffffff" }}>
                Bassam<span style={{ color: "#3B9EFF" }}>Ibrahim</span>
              </span>
              <nav className="hide-mobile" style={{ display: "flex", gap: 24 }}>
                {["هندسة", "سياسة", "نوبيان", "أكاديمية"].map((n) => (
                  <a key={n} href="#" className="nav-link" style={{ fontSize: 13 }}>{n}</a>
                ))}
              </nav>
              <button 
                className="nav-cta" 
                style={{ 
                  padding: "8px 16px", 
                  borderRadius: 8, 
                  fontSize: 12, 
                  fontWeight: 700 
                }}
              >
                تواصل معي
              </button>
            </div>
          </header>

          {/* Hero Section */}
          <section style={{
            minHeight: "100vh",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            textAlign: "center",
            padding: "20px"
          }}>
            <div className="pulse-dot" style={{
              width: 12,
              height: 12,
              borderRadius: "50%",
              background: "#3B9EFF",
              marginBottom: 30
            }}></div>
            <h1 className="anim-fade-up delay-2" style={{
              fontSize: "clamp(2.5rem, 8vw, 5rem)",
              fontWeight: 900,
              lineHeight: 1.2
            }}>
              Bassam <span className="grad-text">Ibrahim</span>
            </h1>
            <p className="anim-fade-up delay-3" style={{
              color: "#6677aa",
              maxWidth: 600,
              marginTop: 20,
              lineHeight: 1.8,
              fontSize: "clamp(0.9rem, 2vw, 1.1rem)"
            }}>
              مهندس باحث متخصص في علوم المواد والتحليل الاستراتيجي. نجمع بين الدقة الهندسية وعمق التاريخ.
            </p>
            <div className="scroll-line" style={{
              width: 2,
              height: 60,
              background: "linear-gradient(to bottom, #3B9EFF, transparent)",
              marginTop: 60
            }}></div>
          </section>

          {/* Cards Section */}
          <section style={{
            padding: "80px 20px",
            maxWidth: 1100,
            margin: "0 auto"
          }}>
            <h2 className="anim-fade-up delay-1" style={{
              fontSize: "clamp(1.5rem, 4vw, 2.2rem)",
              fontWeight: 700,
              textAlign: "center",
              marginBottom: 50,
              color: "#ffffff"
            }}>
              مجالات <span className="grad-text">الخبرة</span>
            </h2>
            <div style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))",
              gap: 20
            }}>
              {CARDS.map((card) => (
                <Card key={card.id} card={card} />
              ))}
            </div>
          </section>

          {/* Footer */}
          <footer style={{
            padding: "40px 20px",
            textAlign: "center",
            borderTop: "1px solid rgba(59,158,255,0.1)",
            background: "rgba(255,255,255,0.01)"
          }}>
            <div style={{
              maxWidth: 600,
              margin: "0 auto",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 20
            }}>
              <div style={{ display: "flex", gap: 20, justifyContent: "center" }}>
                {SOCIALS.map((social, index) => (
                  <a 
                    key={index}
                    href={social.href}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="social-link"
                    style={{
                      color: social.color,
                      fontSize: 13,
                      fontWeight: 600,
                      padding: "8px 16px",
                      borderRadius: 8,
                      border: `1px solid ${social.color}33`,
                      background: `${social.color}0d`
                    }}
                  >
                    {social.name}
                  </a>
                ))}
              </div>
              <p style={{ color: "#445566", fontSize: 12, direction: "ltr" }}>
                © {new Date().getFullYear()} Bassam Ibrahim · جميع الحقوق محفوظة
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
