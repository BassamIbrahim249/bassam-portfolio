    function useDebounce(value, delay) {
      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(handler);
      }, [value, delay]);
      return debounced;
    }

    function parseMarkdownToHTML(md) {
      if (!md || typeof md !== 'string') return "";
      let html = md;
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" loading="lazy" />');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/^---$/gim, '<hr />');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br />');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '');
      return html;
    }

    function ShareButtons({ article }) {
      const [copied, setCopied] = useState(false);
      const articleUrl = window.location.href;
      const title = encodeURIComponent(article.title);
      const url = encodeURIComponent(articleUrl);
      
      const handleShare = async () => {
        if (navigator.share) {
          try { await navigator.share({ title: article.title, text: (article.content || '').substring(0, 100), url: articleUrl }); }
          catch (err) {}
        } else {
          window.open(`https://wa.me/?text=${title}%0A${url}`, '_blank');
        }
      };
      const handleCopyLink = async () => {
        try { await navigator.clipboard.writeText(articleUrl); setCopied(true); setTimeout(() => setCopied(false), 2000); }
        catch (err) { const input = document.createElement('input'); input.value = articleUrl; document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input); setCopied(true); setTimeout(() => setCopied(false), 2000); }
      };
      const openInApp = (platform) => {
        const urls = {
          whatsapp: `https://wa.me/?text=${title}%0A${url}`,
          twitter: `https://twitter.com/intent/tweet?text=${title}&url=${url}`,
          telegram: `https://t.me/share/url?url=${url}&text=${title}`
        };
        window.open(urls[platform], '_blank');
      };
      
      return (
        <div className="share-buttons">
          <button className="share-btn" onClick={handleShare} aria-label="مشاركة المقال">📤 مشاركة</button>
          <button className="share-btn" onClick={() => openInApp('whatsapp')} aria-label="مشاركة عبر واتساب">📲 واتساب</button>
          <button className="share-btn" onClick={() => openInApp('twitter')} aria-label="مشاركة عبر تويتر">𝕏 تويتر</button>
          <button className="share-btn" onClick={() => openInApp('telegram')} aria-label="مشاركة عبر تيليجرام">💬 تيليجرام</button>
          <button className={`share-btn ${copied ? 'copied' : ''}`} onClick={handleCopyLink} aria-label="نسخ رابط المقال">{copied ? '✅ تم النسخ!' : '📋 نسخ الرابط'}</button>
        </div>
      );
    }

    function CommentsSection({ articleId }) {

        if (container && !container.hasChildNodes()) {

          script.setAttribute('theme', 'github-dark');
          script.setAttribute('crossorigin', 'anonymous');
          script.async = true;
          container.appendChild(script);
        }
        return () => { if (container) container.innerHTML = ''; };
      }, [articleId]);
      return (<div className="comments-section"><div id={`comments-${articleId}`}></div></div>);

    function LibrarySection({ category, onBack }) {

    function ArticleListSection({ title, category, onBack }) {

      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [openIndex, setOpenIndex] = useState(null);
      const [lastOpenedIndex, setLastOpenedIndex] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const debouncedQuery = useDebounce(searchQuery, 300);
      
      useEffect(() => {
        setLoading(true); setError(null);
        const cachedData = localStorage.getItem(GLOBAL_CACHE_KEY);
        if (cachedData) {
          try {
            const parsed = JSON.parse(cachedData);
            if (parsed.timestamp && (Date.now() - parsed.timestamp) < CONFIG.cache.ttl) {
              setArticles(parsed.data); setLoading(false); return;
            }
          } catch(e) {}
        }
        fetch(`data.json?v=${APP_VERSION}`)
          .then(res => {
            if (!res.ok) throw new Error('فشل التحميل');
            return res.json();
          })
          .then(data => {
            const allArticles = Array.isArray(data) ? data : [];
            try { localStorage.setItem(GLOBAL_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allArticles })); } catch(e) {}
            setArticles(allArticles);
          })
          .catch(err => {
            if (!navigator.onLine) {
              setError('أنت غير متصل بالإنترنت. تحقق من اتصالك وحاول مجدداً.');
              document.getElementById('offlineBanner')?.classList.add('show');
            } else {
              setError('تعذر تحميل المقالات. حاول مجدداً لاحقاً.');
            }
          })
          .finally(() => setLoading(false));
      }, [category]);
      
      useEffect(() => {
        const handleScroll = () => {
          const scrollTop = document.documentElement.scrollTop;
          const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          const scrolled = (scrollTop / scrollHeight) * 100;
          document.getElementById('readProgress')?.style.setProperty('width', `${scrolled}%`);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);
      
      useEffect(() => {
        if (openIndex !== null && articles[openIndex]) {
          const article = articles[openIndex];
          const meta = document.querySelector('meta[name="description"]');
          if (meta) {
            const short = (article.content || '').replace(/[#*`]/g, '').substring(0, 160);
            meta.setAttribute('content', `${article.title} — ${short}...`);
          }
        }
      }, [openIndex, articles]);
      
      useEffect(() => {
        if (openIndex !== null && articles[openIndex]) {
          const article = articles[openIndex];
          const schema = {
            "@context": "https://schema.org",
            "@type": "Article",
            "headline": article.title,
            "author": {"@type": "Person", "name": article.author},
            "datePublished": article.date,
            "image": article.image ? `https://bassamibrahim249.github.io/bassam-portfolio/${article.image}` : undefined,
            "articleBody": (article.content || '').substring(0, 200),
            "keywords": (article.tags || []).join(", ")
          };
          const script = document.createElement('script');
          script.type = 'application/ld+json';
          script.text = JSON.stringify(schema);
          document.head.appendChild(script);
          return () => { if (script.parentNode) script.parentNode.removeChild(script); };
        }
      }, [openIndex, articles]);
      
      const handleToggle = (idx) => { const newOpen = openIndex === idx ? null : idx; setOpenIndex(newOpen); if (newOpen !== null) setLastOpenedIndex(idx); };
      
      const btnSlug = BUTTON_SLUGS[category] || category;
      const isLibrary = category?.startsWith('library_');
      const filteredArticles = isLibrary ? [] : category ? articles.filter(a => {
        if (a.button) return a.button === btnSlug;
        if (a.category) return a.category === category;
        return false;
      }) : articles;
      const sortedArticles = filteredArticles.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const searchedArticles = debouncedQuery.trim() === '' ? sortedArticles : sortedArticles.filter(a => a.title?.toLowerCase().includes(debouncedQuery.toLowerCase()) || a.tags?.some(t => t.toLowerCase().includes(debouncedQuery.toLowerCase())));
      
      const handleBack = () => {
        const targetId = getCategoryElementId(category);
        onBack();
        setTimeout(() => scrollToElement(targetId), 100);
      };
      
      const getReadingTime = (content) => Math.ceil((content || '').split(' ').length / 200);
      
      return (
        <div style={{ fontFamily: "'Cairo', sans-serif", minHeight: "100vh", padding: "100px 24px 60px", color: "#fff", maxWidth: 900, margin: "0 auto" }}>
          <button onClick={handleBack} style={{ marginBottom: 32, padding: "10px 20px", borderRadius: 12, background: "transparent", border: "1px solid rgba(59,158,255,0.3)", color: "#8899bb", cursor: "pointer", fontSize: 14, fontWeight: "bold", minHeight: '44px' }} aria-label="العودة للرئيسية">← العودة للرئيسية</button>
          <h2 style={{ fontSize: "clamp(1.5rem, 4vw, 2rem)", fontWeight: 900, marginBottom: 30, textAlign: "center", color: "#EAB308" }}>{title} 🔬</h2>
          <input type="text" className="search-input" placeholder="🔍 بحث في المقالات..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} aria-label="بحث في المقالات" />
          
          {loading ? (
            <div style={{ textAlign: "center", marginTop: 40 }}>
              {[1,2,3].map(i => (<div key={i} className="skeleton" style={{ width: '100%', height: '120px', marginBottom: '16px', borderRadius: '12px' }}></div>))}
            </div>
          ) : error ? (
            <div style={{ textAlign: "center", marginTop: 40, color: "#ff6b6b" }}>
              <p>⚠️ {error}</p>
              <button onClick={() => window.location.reload()} style={{ marginTop: 16, padding: "8px 20px", borderRadius: 8, background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", color: "#ff6b6b", cursor: "pointer", fontFamily: "'Cairo', sans-serif", minHeight: '44px' }}>إعادة المحاولة</button>
            </div>
          ) : searchedArticles.length === 0 ? (
            <div style={{ textAlign: "center", marginTop: 40, color: "#8899bb" }}>
              <p style={{ fontSize: 48, marginBottom: 16 }}>📝</p>
              <p>{debouncedQuery ? 'لا توجد نتائج مطابقة' : 'لا توجد مقالات بعد.'}</p>
            </div>
          ) : (
            <div>
              {searchedArticles.map((article, idx) => {
                const isOpen = openIndex === idx;
                const rawHTML = parseMarkdownToHTML(article.content || article.body || '');
                const cleanHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHTML, { ALLOWED_TAGS: ['h1','h2','h3','h4','p','br','strong','em','del','a','img','ul','ol','li','table','thead','tbody','tr','th','td','code','pre','blockquote','hr','span','div'], ALLOWED_ATTR: ['href','target','rel','src','alt','loading','style','class'] }) : rawHTML;
                const commentId = article.id || article.title?.replace(/\s+/g, '-').substring(0, 50) || String(idx);
                const readingTime = getReadingTime(article.content);
                
                return (
                  <div key={idx} className={`accordion-item ${lastOpenedIndex === idx ? 'last-opened' : ''}`}>
                    <div className="accordion-header" onClick={() => handleToggle(idx)} role="button" tabIndex={0} aria-expanded={isOpen} aria-label={`مقال: ${article.title}`}>
                      <div style={{ flex: 1 }}><h3 className="accordion-title">{article.title || 'بدون عنوان'}</h3><div className="accordion-meta">{article.date && <span className="accordion-date">📅 {article.date}</span>}</div></div>
                      <button className={`accordion-toggle-btn ${isOpen ? 'close' : 'read'}`} onClick={(e) => { e.stopPropagation(); handleToggle(idx); }} aria-label={isOpen ? `إغلاق: ${article.title}` : `اقرأ: ${article.title}`}>{isOpen ? '✕ إغلاق' : '📖 اقرأ'}</button>
                    </div>
                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                      {article.image && <img src={article.image} alt={article.title} style={{ width: "100%", borderRadius: 12, marginBottom: 20, boxShadow: "0 10px 30px rgba(0,0,0,0.5)" }} loading="lazy" onError={(e) => { e.target.style.display = 'none'; }} />}
                      <div className="article-body" dangerouslySetInnerHTML={{ __html: cleanHTML }} />
                      
                      <div className="author-meta">✍️ {article.author || 'بسام إبراهيم أحمد'} · 📅 {article.date} · ⏱️ {readingTime} دقائق قراءة</div>
                      
                      {isOpen && <ShareButtons article={article} />}
                      {isOpen && <CommentsSection articleId={commentId} />}
                      
                      {isOpen && (
                        <div className="related-articles">
                          <h4 style={{ fontSize: 14, color: '#EAB308', marginBottom: 12 }}>📌 مقالات ذات صلة</h4>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                            {articles.filter(a => a.id !== article.id && (a.button === article.button || a.tags?.some(t => article.tags?.includes(t)))).slice(0, 3).map(related => (
                              <button key={related.id} className="related-btn" onClick={() => { const i = articles.findIndex(x => x.id === related.id); if (i !== -1) { setOpenIndex(i); setLastOpenedIndex(i); window.scrollTo({ top: 0, behavior: 'smooth' }); } }} aria-label={`اقرأ: ${related.title}`}>{related.title?.substring(0, 25)}...</button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }
