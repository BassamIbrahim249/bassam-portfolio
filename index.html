    function parseMarkdownToHTML(md) {
      if (!md || typeof md !== 'string') return "";
      let html = md;
      html = html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html = html.replace(/`([^`]+)`/g,'<code>$1</code>');
      html = html.replace(/^#### (.*$)/gim,'<h4>$1</h4>').replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>');

      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" loading="lazy" />');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/^---$/gim,'<hr />').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br />');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g,'');
      return html;
    }

      const [lastOpenedIndex, setLastOpenedIndex] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [visibleCount, setVisibleCount] = useState(ITEMS_PER_PAGE);
      const debouncedQuery = useDebounce(searchQuery, 300);
      const t = (k) => I18N[lang]?.[k] || k;

      const getDataFile = (cat) => {
        if (!cat) return 'data/all.json';
        const btnSlug = BUTTON_SLUGS[cat] || cat;
        const map = {
          materials_science:'engineering', construction_innovation:'engineering', engineering_lab:'engineering',
          sudan_history:'political', strategic_analysis:'political', intellectual_visions:'political',
          history:'nubian', archaeology:'nubian', identity:'nubian',
          project_writing:'academy', leadership:'academy', developmental_training:'academy',
          holistic_health:'lifestyle', scientific_nutrition:'lifestyle', physical_excellence:'lifestyle',
          engineering:'engineering', political:'political', nubian:'nubian', academy:'academy', lifestyle:'lifestyle'
        };
        return `data/${map[btnSlug] || btnSlug}.json`;
      };

      useEffect(() => {
        setLoading(true); setError(null); setVisibleCount(ITEMS_PER_PAGE);
        const cacheKey = `bassam_articles_cache_${getDataFile(category).replace('data/','').replace('.json','')}`;
        const cached = localStorage.getItem(cacheKey);
        if (cached) { try { const p=JSON.parse(cached); if(p.timestamp&&(Date.now()-p.timestamp)<CONFIG.cache.ttl){setArticles(p.data);setLoading(false);return;} } catch(e){} }
        fetch(`${getDataFile(category)}?v=${APP_VERSION}`)
          .then(r=>{if(!r.ok)throw new Error();return r.json();})
          .then(d=>{const a=Array.isArray(d)?d:[];try{localStorage.setItem(cacheKey,JSON.stringify({timestamp:Date.now(),data:a}));}catch(e){}setArticles(a);})
          .catch(()=>{if(!navigator.onLine){setError('أنت غير متصل بالإنترنت.');document.getElementById('offlineBanner')?.classList.add('show');}else{setArticles([]);}})
          .finally(()=>setLoading(false));
      }, [category]);

      const handleToggle = (idx) => {
        if(openIndex===idx) setOpenIndex(null);
        else { setOpenIndex(idx); setLastOpenedIndex(idx); setTimeout(()=>{document.getElementById(`article-${idx}`)?.scrollIntoView({behavior:'smooth',block:'start'});},150); }
      };

      const btnSlug = BUTTON_SLUGS[category] || category;
      const isLibrary = category?.startsWith('library_');
      const filtered = isLibrary ? [] : category ? articles.filter(a => a.button === btnSlug || a.category === category) : articles;
      const sorted = filtered.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      const searched = debouncedQuery.trim()===''?sorted:sorted.filter(a=>a.title?.toLowerCase().includes(debouncedQuery.toLowerCase())||a.tags?.some(tag=>tag.toLowerCase().includes(debouncedQuery.toLowerCase())));
      const displayed = searched.slice(0, visibleCount);
      const hasMore = searched.length > visibleCount;

      return (
        <div style={{padding:"100px 24px 60px",maxWidth:900,margin:"0 auto",fontFamily:'Cairo'}}>
          <button onClick={onBack} className="glass-card" style={{marginBottom:32,padding:"12px 24px",borderRadius:14,background:'var(--glass-bg)',border:'1px solid var(--glass-border)',color:'var(--text-secondary)',cursor:'pointer',fontSize:14,fontWeight:'bold',display:'inline-flex',alignItems:'center',gap:8}}>← {t('back')}</button>
          <h2 style={{fontSize:"clamp(1.5rem,4vw,2rem)",fontWeight:900,marginBottom:30,textAlign:"center",color:'var(--accent-gold)'}}>{title}</h2>
          <input type="text" className="search-input" placeholder={t('search')} value={searchQuery} onChange={e=>{setSearchQuery(e.target.value);setVisibleCount(ITEMS_PER_PAGE);}} style={{width:'100%',padding:'14px 20px',borderRadius:14,background:'var(--glass-bg)',border:'1px solid var(--glass-border)',color:'var(--text-primary)',fontFamily:'Cairo',fontSize:14,marginBottom:24,outline:'none'}} />
          
          {loading ? <div style={{display:'flex',flexDirection:'column',gap:16}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:100,width:'100%'}}></div>)}</div> :
           error ? <div style={{textAlign:'center',color:'#ff6b6b'}}><p>{error}</p><button onClick={()=>window.location.reload()} className="glass-card" style={{marginTop:20,padding:'10px 24px',borderRadius:12,color:'#ff6b6b',cursor:'pointer'}}>{lang==='ar'?'إعادة المحاولة':'Retry'}</button></div> :
           displayed.length===0 ? <div style={{textAlign:'center',color:'var(--text-secondary)',padding:40}}><p style={{fontSize:48}}>📝</p><p>{t('noArticles')}</p></div> :
           (<div>
              {displayed.map((article,idx)=>{
                const isOpen = openIndex === idx;
                const rawHTML = parseMarkdownToHTML(article.content||'');
                const cleanHTML = typeof DOMPurify!=='undefined'?DOMPurify.sanitize(rawHTML,{ALLOWED_TAGS:['h1','h2','h3','h4','p','br','strong','em','a','img','ul','ol','li','table','thead','tbody','tr','th','td','code','pre','blockquote','hr','span','div'],ALLOWED_ATTR:['href','target','rel','src','alt','loading','style','class']}):rawHTML;
                return(
                  <div key={article.id||idx} id={`article-${idx}`} className={`accordion-item glass-card ${lastOpenedIndex===idx?'last-opened':''}`} style={{marginBottom:16,borderRadius:14,overflow:'hidden',background:'var(--glass-bg)',border:'1px solid var(--glass-border)'}}>
                    <div onClick={()=>handleToggle(idx)} style={{padding:18,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',gap:12}}>
                      <div style={{flex:1}}><h3 style={{fontSize:17,fontWeight:700,color:'var(--text-primary)'}}>{article.title||'بدون عنوان'}</h3><span style={{fontSize:11,color:'var(--text-secondary)',marginTop:4,display:'block'}}>{article.date}</span></div>
                      <button style={{padding:'8px 16px',borderRadius:10,background:isOpen?'rgba(255,255,255,0.05)':'rgba(234,179,8,0.15)',color:isOpen?'var(--text-secondary)':'var(--accent-gold)',border:'none',cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:'Cairo',whiteSpace:'nowrap'}}>{isOpen?t('close'):t('read')}</button>
                    </div>
                    {isOpen && (
                      <div style={{padding:'0 18px 24px'}}>
                        {article.image && <img src={article.image} alt={article.title} style={{width:'100%',borderRadius:12,marginBottom:20}} loading="lazy" onError={e=>e.target.style.display='none'} />}
                        <div className="article-body" dangerouslySetInnerHTML={{__html:cleanHTML}} style={{lineHeight:1.9,fontSize:15,color:'var(--text-secondary)'}} />
                        <div className="author-meta">{t('author')} · {article.date} · ⏱️ {Math.ceil((article.content||'').split(' ').length/200)} {t('minRead')}</div>
                        <ShareButtons article={article} lang={lang} />
                        <CommentsSection articleId={article.id || article.title?.replace(/\s+/g, '-').substring(0, 50) || String(idx)} />
                        {/* ✅ تمت إعادة قسم "مقالات ذات صلة" */}
                        <div className="related-articles" style={{marginTop: 20, paddingTop: 16, borderTop: '1px solid var(--border-color)'}}>
                          <h4 style={{fontSize: 14, color: 'var(--accent-gold)', marginBottom: 12}}>{t('related')}</h4>
                          <div style={{display:'flex', flexWrap:'wrap', gap: 8}}>
                            {articles.filter(a => a.id !== article.id && (a.button === article.button || a.tags?.some(t => article.tags?.includes(t)))).slice(0, 3).map(related => (
                              <button key={related.id} className="glass-card" onClick={() => { const i = articles.findIndex(x => x.id === related.id); if (i !== -1) { setOpenIndex(i); setLastOpenedIndex(i); window.scrollTo({ top: 0, behavior: 'smooth' }); } }} style={{fontSize: 11, padding: '6px 12px', borderRadius: 8, background: 'rgba(59,158,255,0.1)', color: 'var(--accent-blue)', border: '1px solid rgba(59,158,255,0.3)', cursor: 'pointer', fontWeight: 600, fontFamily: 'Cairo'}}>{related.title?.substring(0, 25)}...</button>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              {hasMore && (
                <div style={{textAlign:'center',marginTop:24}}>
                  <button onClick={()=>setVisibleCount(p=>p+ITEMS_PER_PAGE)} className="glass-card" style={{padding:'14px 36px',borderRadius:14,background:'rgba(59,158,255,0.1)',border:'1px solid rgba(59,158,255,0.3)',color:'var(--accent-blue)',fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'Cairo',transition:'all 0.3s'}}>
                    {t('loadMore')} ({searched.length - visibleCount} {t('remaining')})
                  </button>
                </div>
              )}
            </div>)}
        </div>
      );
    }

      const themes = {

        political:  { color:'#60CFFF', glow:'rgba(96,207,255,0.15)',  border:'rgba(96,207,255,0.4)',   tagBg:'rgba(96,207,255,0.15)',  tagBorder:'rgba(96,207,255,0.4)' },

              <button key={tag} onClick={e=>{e.stopPropagation();onTagClick(tag,card.id);}} className="innovation-tag-btn"
                style={{fontSize:10,padding:'6px 12px',borderRadius:8,background:th.tagBg,color:th.color,border:`1px solid ${th.tagBorder}`,cursor:'pointer',fontWeight:700,fontFamily:"'Cairo',sans-serif",transition:'all 0.3s'}}>{tag}</button>

              {card.academic && <a href={card.academic.url} target="_blank" rel="noopener noreferrer" className="glass-card" style={{padding:'6px 12px',borderRadius:8,color:'#60CFFF',textDecoration:'none',fontSize:10,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>{t('lab')}</a>}
              {card.librarySlug&&(
                <button onClick={e=>{e.stopPropagation();onLibraryClick(card.librarySlug,card.id);}} className="lib-btn" style={{padding:'8px 18px',borderRadius:10,background:`${th.color}20`,color:th.color,border:`1px solid ${th.color}40`,cursor:'pointer',fontWeight:700,fontSize:11,fontFamily:"'Cairo',sans-serif"}}>{t('library')}</button>
