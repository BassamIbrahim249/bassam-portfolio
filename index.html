  <!-- ============ التحسين رقم 1: إضافة DOMPurify للأمان ============ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #080c12; font-family: 'Cairo', sans-serif; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    
    /* ============ التحسين رقم 3: دعم تقليل الحركة ============ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes goldenPulse { 0%, 100% { box-shadow: 0 0 5px rgba(234,179,8,0.3); } 50% { box-shadow: 0 0 20px rgba(234,179,8,0.7); } }
    @keyframes scrollLine { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 51% { transform: scaleY(1); transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }
    @keyframes backToTopPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(59,158,255,0.4); } 50% { box-shadow: 0 0 0 12px rgba(59,158,255,0); } }
    
    /* تفعيل الأنيميشن فقط إذا لم يطلب المستخدم تقليل الحركة */
    @media (prefers-reduced-motion: no-preference) {
      .anim-fade-up { animation: fadeUp 0.75s ease both; }
      .pulse-dot { animation: pulseGlow 2.2s ease-in-out infinite; }
      .scroll-line { animation: scrollLine 2s ease-in-out infinite; }
      .back-to-top { animation: backToTopPulse 2s infinite; }
      .accordion-item.last-opened { animation: goldenPulse 2s ease-in-out infinite; }
    }
    
    /* عند طلب تقليل الحركة - تعطيل كل الأنيميشن */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      html { scroll-behavior: auto; }
      .anim-fade-up { opacity: 1; transform: none; }
      .pulse-dot { opacity: 0.6; }
      .accordion-item.last-opened { border-color: rgba(234,179,8,0.5); box-shadow: 0 0 5px rgba(234,179,8,0.3); }
    }
    
    .delay-1 { animation-delay: 0.10s; } .delay-2 { animation-delay: 0.25s; } .delay-3 { animation-delay: 0.40s; } .delay-4 { animation-delay: 0.55s; } .delay-5 { animation-delay: 0.70s; }
    .grad-text { background: linear-gradient(135deg, #3B9EFF, #60CFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-wrap { transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease, background 0.45s ease; }
    .social-btn { transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
    .navbar { transition: background 0.35s ease, border-color 0.35s ease, backdrop-filter 0.35s ease; }
    .btn-primary { transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .btn-primary:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(59,158,255,0.45); }
    .btn-outline { border: 1px solid rgba(59,158,255,0.3); color: #8899bb; transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease; }
    .btn-outline:hover { border-color: rgba(59,158,255,0.7); color: #3B9EFF; transform: scale(1.04); }
    .nav-cta { background: linear-gradient(135deg, rgba(37,211,102,0.18), rgba(37,211,102,0.08)); border: 1px solid rgba(37,211,102,0.45); color: #25D366; transition: background 0.25s ease, box-shadow 0.25s ease; cursor: pointer; }
    .nav-cta:hover { background: linear-gradient(135deg, rgba(37,211,102,0.28), rgba(37,211,102,0.16)); box-shadow: 0 0 22px rgba(37,211,102,0.3); }
    .innovation-tag-btn { transition: all 0.3s ease; }
    .innovation-tag-btn:hover { background: rgba(59,158,255,0.25) !important; color: #ffffff !important; }
    .accordion-item { border: 1px solid rgba(234,179,8,0.15); border-radius: 12px; margin-bottom: 16px; overflow: hidden; background: rgba(255,255,255,0.02); transition: all 0.3s ease; }
    .accordion-item.last-opened { border-color: rgba(234,179,8,0.5); }
    .accordion-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.3s ease; gap: 12px; }
    .accordion-header:hover { background: rgba(234,179,8,0.05); }
    .accordion-title { font-size: 18px; font-weight: 700; color: #ffffff; margin: 0; flex: 1; }
    .accordion-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .accordion-date { font-size: 11px; color: #6677aa; }
    .accordion-toggle-btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s ease; font-family: 'Cairo', sans-serif; white-space: nowrap; }
    .accordion-toggle-btn.read { background: rgba(234,179,8,0.15); color: #EAB308; border: 1px solid rgba(234,179,8,0.4); }
    .accordion-toggle-btn.close { background: rgba(255,255,255,0.05); color: #8899bb; border: 1px solid rgba(255,255,255,0.1); }
    .accordion-toggle-btn.read:hover { background: rgba(234,179,8,0.25); color: #fff; }
    .accordion-toggle-btn.close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .accordion-content { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.5s ease; }
    .accordion-content.open { max-height: 5000px; padding: 0 20px 24px; }
    .accordion-content p { color: #8899bb; line-height: 1.9; margin-bottom: 16px; font-size: 15px; }
    .accordion-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .accordion-tag { font-size: 10px; padding: 3px 8px; border-radius: 50px; background: rgba(234,179,8,0.1); color: #EAB308; border: 1px solid rgba(234,179,8,0.2); }
    
    /* أنماط محتوى المقال */
    .article-body { color: #8899bb; line-height: 1.9; font-size: 15px; }
    .article-body h2, .article-body h3 { color: #EAB308; font-size: 18px; font-weight: 700; margin: 20px 0 12px; }
    .article-body p { margin-bottom: 14px; }
    .article-body a { color: #3B9EFF; text-decoration: underline; }
    .article-body img { max-width: 100%; border-radius: 12px; margin: 16px 0; height: auto; }
    .article-body ul, .article-body ol { color: #8899bb; margin: 12px 20px; }
    .article-body li { margin-bottom: 6px; }
    .article-body code { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .article-body pre { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; border: 1px solid rgba(255,255,255,0.06); direction: ltr; text-align: left; white-space: pre-wrap; }
    .article-body blockquote { border-right: 3px solid #EAB308; padding-right: 16px; margin: 16px 0; color: #8899bb; font-style: italic; }
    .article-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    .article-body th, .article-body td { border: 1px solid rgba(255,255,255,0.1); padding: 10px 14px; text-align: right; }
    .article-body th { background: rgba(234,179,8,0.1); color: #EAB308; font-weight: 700; }
    .article-body td { background: rgba(255,255,255,0.02); }
    .article-body hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 24px 0; }
    
    /* زر التثبيت */
    .install-btn { background: linear-gradient(135deg,#3B9EFF,#2563eb); color: #fff; border: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Cairo', sans-serif; width: 100%; margin-bottom: 14px; box-shadow: 0 0 30px rgba(59,158,255,0.4); transition: transform 0.25s ease; }
    .install-btn:hover { transform: scale(1.03); }
    .dismiss-btn { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #6677aa; padding: 12px 32px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'Cairo', sans-serif; width: 100%; }
    
    @media (max-width: 768px) { .hide-mobile { display: none !important; } .accordion-header { flex-wrap: wrap; } .accordion-title { flex: 1 1 100%; } }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ============ التحسين رقم 4: كائن CONFIG موحد ============
    const CONFIG = {
      github: {
        username: "bassamibrahim249",
        repo: "bassam-portfolio",
        articlesPath: "content/articles",
      },
      site: {
        url: "https://bassamibrahim249.github.io/bassam-portfolio/",
      },
      contact: {
        whatsapp: "249967238251",
      },
      cache: {
        key: "bassam_articles_cache",
        ttl: 24 * 60 * 60 * 1000, // 24 ساعة
      },
    };

    // ============ التحسين رقم 5: دالة Markdown محسنة ============
    function parseMarkdownToHTML(md) {
      if (!md || typeof md !== 'string') return "";
      let html = md;
      
      // حماية: تحويل أحرف HTML الخاصة
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      // الكود المضمن (يجب أن يكون قبل التنسيقات الأخرى)
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // العناوين
      html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      
      // تنسيق النص
      html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
      
      // الروابط والصور
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" loading="lazy" />');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      
      // الخط الأفقي
      html = html.replace(/^---$/gim, '<hr />');
      
      // الجداول
      html = html.replace(/^\|(.+)\|\s*$\n^\|[-| :]+\|\s*$\n((?:^\|.+\|\s*$\n?)*)/gm, (match, header, rows) => {
        const headerCells = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rowHTML = rows.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headerCells}</tr></thead><tbody>${rowHTML}</tbody></table>`;
      });
      
      // القوائم غير المرتبة (مع تداخل)
      html = html.replace(/^(\s*)[-*]\s+(.*$)/gim, (match, indent, content) => {
        const level = Math.floor(indent.length / 2);
        const marginLeft = level * 20;
        return `<li style="margin-right:${marginLeft}px">${content}</li>`;
      });
      
      // القوائم المرتبة
      html = html.replace(/^\d+\.\s+(.*$)/gim, '<li>$1</li>');
      
      // الاقتباسات
      html = html.replace(/^&gt;\s?(.*$)/gim, '<blockquote>$1</blockquote>');
      
      // تجميع فقرات
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br />');
      html = '<p>' + html + '</p>';
      
      // تجميع عناصر القائمة المتجاورة
      html = html.replace(/(<li[^>]*>.*?<\/li>)\s*(?=<li)/gs, '$1');
      html = html.replace(/((?:<li[^>]*>.*?<\/li>\s*)+)/gs, '<ul>$1</ul>');
      
      // إصلاح الفقرات الفارغة
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>\s*<br\s*\/?>\s*<\/p>/g, '');
      
      return html;
    }

    // ============ مكون قائمة المقالات ============
    function ArticleListSection({ title, category, onBack }) {
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [openIndex, setOpenIndex] = useState(null);
      const [lastOpenedIndex, setLastOpenedIndex] = useState(null);
      const contentRefs = useRef({});

      useEffect(() => {
        setLoading(true);
        setError(null);
        
        const cacheKey = `${CONFIG.cache.key}_${category || 'all'}`;
        
        // ============ التحسين رقم 2: Cache باستخدام localStorage ============
        const cachedData = localStorage.getItem(cacheKey);
        if (cachedData) {
          try {
            const parsed = JSON.parse(cachedData);
            if (parsed.timestamp && (Date.now() - parsed.timestamp) < CONFIG.cache.ttl) {
              setArticles(parsed.data);
              setLoading(false);
              return;
            }
          } catch(e) {
            localStorage.removeItem(cacheKey);
          }
        }
        
        const apiUrl = `https://api.github.com/repos/${CONFIG.github.username}/${CONFIG.github.repo}/contents/${CONFIG.github.articlesPath}`;

        fetch(apiUrl)
          .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
          })
          .then(files => {
            const articleFiles = Array.isArray(files) ? files.filter(f => f.name.endsWith('.md') || f.name.endsWith('.json')) : [];
            if (articleFiles.length === 0) { 
              setArticles([]); 
              setLoading(false); 
              return; 
            }

            return Promise.all(
              articleFiles.map(f =>
                fetch(f.download_url)
                  .then(res => res.text())
                  .then(text => {
                    try {
                      const json = JSON.parse(text);
                      return { title: json.title, date: json.date, category: json.category, tags: json.tags, body: json.body || json.content || '', headerImage: json.headerImage };
                    } catch(e) {}

                    const fmMatch = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)/);
                    if (fmMatch) {
                      const fm = fmMatch[1];
                      const body = fmMatch[2].trim();
                      const result = { body };
                      const titleMatch = fm.match(/title:\s*["']?(.+?)["']?\s*$/m);
                      const dateMatch = fm.match(/date:\s*["']?(.+?)["']?\s*$/m);
                      const categoryMatch = fm.match(/categor(?:y|ies):\s*\[?"' ]?(.+?)["']?\s*$/m);
                      const tagsMatch = fm.match(/tags:\s*\[(.+?)\]\s*$/m);
                      if (titleMatch) result.title = titleMatch[1].trim();
                      if (dateMatch) result.date = dateMatch[1].trim();
                      if (categoryMatch) result.category = categoryMatch[1].trim();
                      if (tagsMatch) result.tags = tagsMatch[1].split(',').map(t => t.trim().replace(/["']/g, ''));
                      return result;
                    }

                    const lines = text.split('\n').filter(l => l.trim());
                    const titleLine = lines.find(l => l.trim().startsWith('# '));
                    return {
                      title: titleLine ? titleLine.trim().replace(/^#\s*/, '') : f.name.replace(/\.(md|json)$/, ''),
                      body: text,
                      date: '',
                      category: category || '',
                      tags: []
                    };
                  })
                  .catch(() => null)
              )
            );
          })
          .then(data => {
            if (!data) { setArticles([]); return; }
            const valid = data.filter(a => a !== null);
            const filtered = category ? valid.filter(a => a.category === category) : valid;
            const sorted = filtered.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            setArticles(sorted);
            
            // ============ التحسين رقم 2: تخزين في cache ============
            try {
              localStorage.setItem(cacheKey, JSON.stringify({
                timestamp: Date.now(),
                data: sorted
              }));
            } catch(e) {
              // localStorage ممتلئ - تجاهل
            }
          })
          .catch(err => { setError(err.message); })
          .finally(() => setLoading(false));
      }, [category]);

      const handleToggle = (idx) => {
        const newOpen = openIndex === idx ? null : idx;
        setOpenIndex(newOpen);
        if (newOpen !== null) setLastOpenedIndex(idx);
      };

      return (
        <div style={{ fontFamily: "'Cairo', sans-serif", minHeight: "100vh", padding: "100px 24px 60px", color: "#fff", maxWidth: 900, margin: "0 auto" }}>
          <button onClick={onBack} style={{ marginBottom: 32, padding: "10px 20px", borderRadius: 12, background: "transparent", border: "1px solid rgba(59,158,255,0.3)", color: "#8899bb", cursor: "pointer", fontSize: 14, fontWeight: "bold", fontFamily: "'Cairo', sans-serif" }}>← العودة للرئيسية</button>
          <h2 style={{ fontSize: "clamp(1.5rem, 4vw, 2rem)", fontWeight: 900, marginBottom: 30, textAlign: "center", color: "#EAB308" }}>{title} 🔬</h2>
          
          {loading ? (
            <div style={{ textAlign: "center", marginTop: 40, color: "#667788" }}>
              <div className="pulse-dot" style={{ width: 8, height: 8, borderRadius: "50%", background: "#EAB308", margin: "0 auto 20px" }} />
              <p>جاري تحميل المقالات...</p>
            </div>
          ) : error ? (
            <div style={{ textAlign: "center", marginTop: 40, color: "#ff6b6b" }}>
              <p>⚠️ خطأ في تحميل المقالات: {error}</p>
              <button onClick={() => window.location.reload()} style={{ marginTop: 16, padding: "8px 20px", borderRadius: 8, background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", color: "#ff6b6b", cursor: "pointer", fontFamily: "'Cairo', sans-serif" }}>إعادة المحاولة</button>
            </div>
          ) : articles.length === 0 ? (
            <div style={{ textAlign: "center", marginTop: 40, color: "#667788" }}>
              <p style={{ fontSize: 48, marginBottom: 16 }}>📝</p>
              <p>لا توجد مقالات في هذا القسم بعد.</p>
            </div>
          ) : (
            <div>
              {articles.map((article, idx) => {
                const isOpen = openIndex === idx;
                const isLast = lastOpenedIndex === idx;
                
                // ============ التحسين رقم 1: DOMPurify لتنقية المحتوى ============
                const rawHTML = parseMarkdownToHTML(article.body);
                const cleanHTML = typeof DOMPurify !== 'undefined' 
                  ? DOMPurify.sanitize(rawHTML, { 
                      ALLOWED_TAGS: ['h1','h2','h3','h4','p','br','strong','em','del','a','img','ul','ol','li','table','thead','tbody','tr','th','td','code','pre','blockquote','hr','span','div'],
                      ALLOWED_ATTR: ['href','target','rel','src','alt','loading','style','class']
                    }) 
                  : rawHTML;
                
                return (
                  <div key={idx} className={`accordion-item ${isLast ? 'last-opened' : ''}`}>
                    <div className="accordion-header" onClick={() => handleToggle(idx)} role="button" tabIndex={0} aria-expanded={isOpen} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleToggle(idx); } }}>
                      <div style={{ flex: 1 }}>
                        <h3 className="accordion-title">{article.title || 'بدون عنوان'}</h3>
                        <div className="accordion-meta">
                          {article.date && <span className="accordion-date">📅 {article.date}</span>}
                          {article.tags && article.tags.length > 0 && (
                            <div className="accordion-tags">
                              {article.tags.map((tag, ti) => <span key={ti} className="accordion-tag">{tag}</span>)}
                            </div>
                          )}
                        </div>
                      </div>
                      <button className={`accordion-toggle-btn ${isOpen ? 'close' : 'read'}`} onClick={(e) => { e.stopPropagation(); handleToggle(idx); }} aria-label={isOpen ? 'إغلاق المقال' : 'قراءة المقال'}>
                        {isOpen ? '✕ إغلاق' : '📖 اقرأ'}
                      </button>
                    </div>
                    <div className={`accordion-content ${isOpen ? 'open' : ''}`} ref={el => contentRefs.current[idx] = el}>

              <div style={{ textAlign: "center", marginBottom: 56 }}><p style={{ fontSize: 10, letterSpacing: "0.4em", color: "#3B9EFF", marginBottom: 10, fontWeight: 600 }}>المحاور الرئيسية</p><h2 style={{ fontSize: "clamp(1.5rem, 4vw, 2rem)", fontWeight: 900 }}>خمسة مجالات. رؤية واحدة.</h2></div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 22 }}>
                {CARDS.map(card => (<Card key={card.id} card={card} onTagClick={handleTagClick} />))}
              </div>
            </div>
          </section>

          {/* Vision Section */}
          <section id="vision-section" style={{ padding: "60px 24px", zIndex: 1 }}><div style={{ maxWidth: 860, margin: "0 auto", borderRadius: 20, padding: "48px 40px", textAlign: "center", background: "linear-gradient(135deg,rgba(59,158,255,0.08),rgba(96,207,255,0.04))", border: "1px solid rgba(59,158,255,0.15)" }}><div style={{ fontSize: 44, marginBottom: 14 }}>⬡</div><h3 style={{ fontSize: 22, fontWeight: 700, marginBottom: 14 }}>الرؤية والرسالة</h3><p style={{ color: "#6677aa", lineHeight: 1.9, maxWidth: 580, margin: "0 auto", fontSize: 14 }}>أؤمن بأن التخصص الحقيقي لا يُقيّد صاحبه، بل يمنحه مفاتيح لفهم العالم بطرق متعددة. هذه المنصة تعكس مسيرتي في بناء جسور معرفية بين الهندسة والسياسة والإنسان.</p></div></section>

          {/* Footer */}
          <footer style={{ padding: "48px 24px 32px", borderTop: "1px solid rgba(59,158,255,0.1)", zIndex: 1 }}><div style={{ maxWidth: 860, margin: "0 auto" }}><div style={{ textAlign: "center", marginBottom: 28 }}><p style={{ fontSize: 10, letterSpacing: "0.4em", color: "#3B9EFF", marginBottom: 20, fontWeight: 600 }}>تواصل معي</p><div style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap" }}>{SOCIALS.map(s => <SocialIcon key={s.name} social={s} />)}</div></div><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap", paddingTop: 28, borderTop: "1px solid rgba(59,158,255,0.1)", textAlign: "center" }}><div style={{ display: "flex", alignItems: "center", gap: 10 }}><div style={{ width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#3B9EFF,#60CFFF)", fontSize: 10, fontWeight: 900, color: "#080c12" }}>B.I</div><span style={{ fontWeight: 700, color: "#fff", fontSize: 13 }}>BassamIbrahim</span></div><p style={{ fontSize: 11, color: "#334455" }}>© {new Date().getFullYear()} · جميع الحقوق محفوظة</p></div></div></footer>
          <WelcomeInstallPopup />
          <BackToTop />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
