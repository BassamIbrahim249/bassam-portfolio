    function Card({ card }) {
      const [hover, setHover] = useState(false);
      const isNubian = card.id === "nubian";
      const hoverBg = isNubian ? "rgba(234,179,8,0.06)" : "rgba(59,158,255,0.06)";
      const hoverBorder = isNubian ? "rgba(234,179,8,0.4)" : "rgba(59,158,255,0.3)";
      return (
        <div id={card.id} className="card-wrap" onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)} style={{ position: "relative", background: hover ? hoverBg : "rgba(255,255,255,0.02)", border: "1px solid", borderColor: hover ? hoverBorder : "rgba(255,255,255,0.06)", borderRadius: 20, padding: "32px 28px", overflow: "hidden", cursor: "pointer", transform: hover ? "translateY(-6px)" : "translateY(0)", scrollMarginTop: 100 }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: hover ? card.accent : "transparent" }} />
          <div className="card-icon-box" style={{ width: 56, height: 56, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", background: hover ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.03)", border: "1px solid", borderColor: hover ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.05)", marginBottom: 24 }}>{card.icon}</div>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 8 }}>{card.title}</h3>
          <p style={{ fontSize: 12, fontWeight: 600, color: card.accent, marginBottom: 14 }}>{card.subtitle}</p>
          <p style={{ fontSize: 13, color: "#8899bb", lineHeight: 1.7, marginBottom: 24 }}>{card.desc}</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>{card.tags.map(t => (<span key={t} style={{ fontSize: 10, padding: "4px 10px", borderRadius: 6, background: "rgba(255,255,255,0.03)", color: "#6677aa", border: "1px solid rgba(255,255,255,0.05)" }}>{t}</span>))}</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, fontWeight: 700, color: hover ? card.accent : "#445566" }}><span>اكتشف المزيد</span><span style={{ transform: hover ? "translateX(-4px)" : "none", display: "inline-block" }}>←</span></div>

    function SocialIcon({ social }) {

    function BackToTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => { const h = () => setVisible(window.scrollY > 600); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);
      if (!visible) return null;
      return (<button onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} className="back-to-top" style={{ position: "fixed", bottom: 24, left: 24, zIndex: 99, width: 44, height: 44, borderRadius: "50%", background: "rgba(59,158,255,0.15)", border: "1px solid rgba(59,158,255,0.4)", color: "#3B9EFF", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} aria-label="العودة للأعلى">↑</button>);
    }

    function WelcomeInstallPopup() {
      const [show, setShow] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [dismissed, setDismissed] = useState(false);

      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          const wasDismissed = localStorage.getItem("pwa_install_dismissed");
          if (!wasDismissed && !dismissed) {
            setTimeout(() => setShow(true), 5000);
          }
        };
        window.addEventListener("beforeinstallprompt", handler);
        return () => window.removeEventListener("beforeinstallprompt", handler);
      }, [dismissed]);

      const handleInstall = useCallback(async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          setDeferredPrompt(null);
          setShow(false);
          if (outcome === "accepted") {
            localStorage.removeItem("pwa_install_dismissed");
          } else {
            localStorage.setItem("pwa_install_dismissed", "true");
          }
        }
      }, [deferredPrompt]);

      const handleDismiss = useCallback(() => {
        setShow(false);
        setDismissed(true);
        localStorage.setItem("pwa_install_dismissed", "true");
      }, []);

      if (!show) return null;

      return (
        <div className="install-overlay" onClick={handleDismiss}>
          <div className="install-popup" onClick={(e) => e.stopPropagation()}>
            <div className="install-icon">B.I</div>
            <h3 style={{ fontSize: 20, fontWeight: 700, color: "#fff", marginBottom: 12 }}>
              مرحباً بك في منصتي الرقمية

            </p>
            <button className="install-btn-yes" onClick={handleInstall}>📲 تثبيت الآن</button>
            <button className="install-btn-no" onClick={handleDismiss}>ليس الآن</button>
          </div>
        </div>
      );
    }

            <div style={{ position: "absolute", bottom: 32, left: "50%", transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, opacity: 0.3 }}><div className="scroll-line" style={{ width: 1, height: 44, background: "linear-gradient(to bottom, transparent, #3B9EFF)" }} /><span style={{ fontSize: 9, letterSpacing: "0.25em", color: "#3B9EFF" }}>SCROLL</span></div>
