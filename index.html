  <style>

    .delay-1 { animation-delay: 0.10s; } .delay-2 { animation-delay: 0.25s; } .delay-3 { animation-delay: 0.40s; } .delay-4 { animation-delay: 0.55s; } .delay-5 { animation-delay: 0.70s; }

    .nav-cta:hover { background: linear-gradient(135deg, rgba(37,211,102,0.28), rgba(37,211,102,0.16)); box-shadow: 0 0 25px rgba(37,211,102,0.4); }

<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const CONFIG = {
      github: { username: "bassamibrahim249", repo: "bassam-portfolio", articlesPath: "content/articles" },
      contact: { whatsapp: "249967238251" },
      cache: { key: "bassam_articles_cache", ttl: 24 * 60 * 60 * 1000 },
    };

    function parseMarkdownToHTML(md) {
      if (!md || typeof md !== 'string') return "";
      let html = md;
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" loading="lazy" />');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/^---$/gim, '<hr />');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br />');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '');
      return html;
    }

    function ArticleListSection({ title, category, onBack }) {
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [openIndex, setOpenIndex] = useState(null);
      const [lastOpenedIndex, setLastOpenedIndex] = useState(null);

      useEffect(() => {
        setLoading(true);
        setError(null);
        const cacheKey = `${CONFIG.cache.key}_${category || 'all'}`;
        const cachedData = localStorage.getItem(cacheKey);
        if (cachedData) {
          try {
            const parsed = JSON.parse(cachedData);
            if (parsed.timestamp && (Date.now() - parsed.timestamp) < CONFIG.cache.ttl) {
              setArticles(parsed.data);
              setLoading(false);
              return;
            }
          } catch(e) {}
        }

        // 🔄 قراءة من data.json مباشرة بدل GitHub API
        fetch('data.json')
          .then(res => res.json())
          .then(data => {
            const articles = Array.isArray(data) ? data : [];
            const filtered = category ? articles.filter(a => a.tab === category || a.button === category || a.category === category) : articles;
            const sorted = filtered.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            setArticles(sorted);
            try { localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: sorted })); } catch(e) {}
          })
          .catch(err => setError(err.message))
          .finally(() => setLoading(false));
      }, [category]);

      const handleToggle = (idx) => {
        const newOpen = openIndex === idx ? null : idx;
        setOpenIndex(newOpen);
        if (newOpen !== null) setLastOpenedIndex(idx);
      };

      return (
        <div style={{ fontFamily: "'Cairo', sans-serif", minHeight: "100vh", padding: "100px 24px 60px", color: "#fff", maxWidth: 900, margin: "0 auto" }}>
          <button onClick={onBack} style={{ marginBottom: 32, padding: "10px 20px", borderRadius: 12, background: "transparent", border: "1px solid rgba(59,158,255,0.3)", color: "#8899bb", cursor: "pointer", fontSize: 14, fontWeight: "bold", fontFamily: "'Cairo', sans-serif" }}>← العودة للرئيسية</button>
          <h2 style={{ fontSize: "clamp(1.5rem, 4vw, 2rem)", fontWeight: 900, marginBottom: 30, textAlign: "center", color: "#EAB308" }}>{title} 🔬</h2>
          {loading ? <div style={{ textAlign: "center", marginTop: 40, color: "#667788" }}><div className="pulse-dot" style={{ width: 8, height: 8, borderRadius: "50%", background: "#EAB308", margin: "0 auto 20px" }} /><p>جاري تحميل المقالات...</p></div> :
           error ? <div style={{ textAlign: "center", marginTop: 40, color: "#ff6b6b" }}><p>⚠️ خطأ: {error}</p><button onClick={() => window.location.reload()} style={{ marginTop: 16, padding: "8px 20px", borderRadius: 8, background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", color: "#ff6b6b", cursor: "pointer", fontFamily: "'Cairo', sans-serif" }}>إعادة المحاولة</button></div> :
           articles.length === 0 ? <div style={{ textAlign: "center", marginTop: 40, color: "#667788" }}><p style={{ fontSize: 48, marginBottom: 16 }}>📝</p><p>لا توجد مقالات بعد.</p></div> :
            <div>{articles.map((article, idx) => {
              const isOpen = openIndex === idx;
              const rawHTML = parseMarkdownToHTML(article.content || article.body || '');
              const cleanHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHTML, { ALLOWED_TAGS: ['h1','h2','h3','h4','p','br','strong','em','del','a','img','ul','ol','li','table','thead','tbody','tr','th','td','code','pre','blockquote','hr','span','div'], ALLOWED_ATTR: ['href','target','rel','src','alt','loading','style','class'] }) : rawHTML;
              return (
                <div key={idx} className={`accordion-item ${lastOpenedIndex === idx ? 'last-opened' : ''}`}>
                  <div className="accordion-header" onClick={() => handleToggle(idx)} role="button" tabIndex={0} aria-expanded={isOpen}>
                    <div style={{ flex: 1 }}>
                      <h3 className="accordion-title">{article.title || 'بدون عنوان'}</h3>
                      <div className="accordion-meta">
                        {article.date && <span className="accordion-date">📅 {article.date}</span>}
                        {article.tags && article.tags.length > 0 && <div className="accordion-tags">{article.tags.map((tag, ti) => <span key={ti} className="accordion-tag">{tag}</span>)}</div>}
                      </div>
                    </div>
                    <button className={`accordion-toggle-btn ${isOpen ? 'close' : 'read'}`} onClick={(e) => { e.stopPropagation(); handleToggle(idx); }}>{isOpen ? '✕ إغلاق' : '📖 اقرأ'}</button>
                  </div>
                  <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                    {article.image && <img src={article.image} alt={article.title} style={{ width: "100%", borderRadius: 12, marginBottom: 20, boxShadow: "0 10px 30px rgba(0,0,0,0.5)" }} loading="lazy" />}
                    <div className="article-body" dangerouslySetInnerHTML={{ __html: cleanHTML }} />
                  </div>
                </div>
              );
            })}</div>
          }
        </div>
      );
    }

    function Card({ card, onTagClick }) {
      const [hover, setHover] = useState(false);
      const isNubian = card.id === "nubian";
      const hoverBg = isNubian ? "rgba(234,179,8,0.08)" : "rgba(59,158,255,0.08)";
      const hoverBorder = isNubian ? "rgba(234,179,8,0.5)" : "rgba(59,158,255,0.4)";
      
      return (
        <div className={`card-wrap ${isNubian ? 'nubian-card' : ''}`}
          onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{ 
            background: hover ? hoverBg : 'rgba(255,255,255,0.02)', 
            border: '1px solid', 
            borderColor: hover ? hoverBorder : 'rgba(255,255,255,0.06)', 
            borderRadius: 20, padding: 32, cursor: 'pointer', scrollMarginTop: 100 
          }}>
          <div style={{ width: 56, height: 56, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hover ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)', marginBottom: 24, border: '1px solid', borderColor: hover ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)' }}>
            {card.icon}
          </div>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: '#fff', marginBottom: 8 }}>{card.title}</h3>
          <p style={{ fontSize: 12, fontWeight: 600, color: card.accent, marginBottom: 14 }}>{card.subtitle}</p>
          <p style={{ fontSize: 13, color: '#8899bb', lineHeight: 1.7, marginBottom: 24 }}>{card.desc}</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
            {card.tags.map(t => <button key={t} onClick={(e) => { e.stopPropagation(); onTagClick(t); }} className="innovation-tag-btn" style={{ fontSize: 10, padding: '4px 10px', borderRadius: 6, background: 'rgba(59,158,255,0.15)', color: '#3B9EFF', border: '1px solid rgba(59,158,255,0.4)', cursor: 'pointer', fontWeight: 700, fontFamily: "'Cairo', sans-serif" }}>{t}</button>)}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, fontWeight: 700, color: hover ? card.accent : '#445566' }}>
              <span>اكتشف المزيد</span>
              <span style={{ transform: hover ? 'translateX(-4px)' : 'none', display: 'inline-block' }}>←</span>
            </div>
            {card.academic && (
              <a href={card.academic.url} target="_blank" rel="noopener noreferrer" className="academic-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                {card.academic.label}
              </a>
            )}
          </div>
        </div>
      );
    }

    function SocialIcon({ social }) {
      const [hover, setHover] = useState(false);
      return (
        <a href={social.href} target="_blank" rel="noopener noreferrer" className="social-btn" style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px', borderRadius: 12, background: hover ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)', border: '1px solid', borderColor: hover ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.05)', color: hover ? social.color : '#6677aa', textDecoration: 'none', transform: hover ? 'translateY(-3px)' : 'none' }}>
          {social.icon}
          <span style={{ fontSize: 11, fontWeight: 700 }}>{social.name}</span>
        </a>
      );
    }

    function BackToTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => { const h = () => setVisible(window.scrollY > 600); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);
      if (!visible) return null;
      return <button onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} className="back-to-top" style={{ position: "fixed", bottom: 24, left: 24, zIndex: 99, width: 44, height: 44, borderRadius: "50%", background: "rgba(59,158,255,0.15)", border: "1px solid rgba(59,158,255,0.4)", color: "#3B9EFF", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} aria-label="العودة للأعلى">↑</button>;
    }

    function WelcomeInstallPopup() {
      const [show, setShow] = useState(false); const [deferredPrompt, setDeferredPrompt] = useState(null);
      useEffect(() => { const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); }; window.addEventListener("beforeinstallprompt", handler); const wasDismissed = localStorage.getItem("pwa_welcome_dismissed"); if (!wasDismissed) { const timer = setTimeout(() => setShow(true), 5000); return () => { clearTimeout(timer); window.removeEventListener("beforeinstallprompt", handler); }; } return () => window.removeEventListener("beforeinstallprompt", handler); }, []);
