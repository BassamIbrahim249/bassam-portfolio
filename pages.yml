media:
  input: assets/images
  output: /assets/images

content:
  - name: articles
    label: 📝 المقالات
    type: collection
    path: content/articles
    format: json
    fields:
      - name: title
        label: عنوان المقال
        type: string
        required: true
      - name: headerImage
        label: الصورة الرئيسية
        type: object
        required: false
        fields:
          - name: src
            label: مسار الصورة
            type: image
          - name: alt
            label: النص البديل
            type: string
      - name: paragraphs
        label: المقدمة (فقرات)
        type: list
        required: false
        list:
          type: text
          label: فقرة
      - name: sections
        label: أقسام المقال
        type: list
        required: false
        list:
          type: object
          label: قسم
          fields:
            - name: heading
              label: عنوان القسم
              type: string
            - name: text
              label: نص القسم
              type: list
              required: false
              list:
                type: text
                label: فقرة
            - name: image
              label: صورة القسم (اختياري)
              type: object
              required: false
              fields:
                - name: src
                  label: مسار الصورة
                  type: image
                - name: alt
                  label: النص البديل
                  type: string
      - name: tags
        label: كلمات مفتاحية
        type: list
        required: false
        list:
          type: string
          label: كلمة
      - name: allowComments
        label: تفعيل التعليقات
        type: boolean
        default: true
        required: false
