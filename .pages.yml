content:
  - name: articles
    label: المقالات
    type: collection
    path: content/articles
    format: json
    fields:
      - name: title
        label: عنوان المقال
        widget: string
        required: true
      - name: date
        label: تاريخ النشر
        widget: datetime
      - name: category
        label: القسم
        widget: select
        options:
          - "innovation"
          - "materials"
          - "political"
          - "nubian"
          - "lifestyle"
      - name: headerImage
        label: الصورة الرئيسية
        widget: image
      - name: tags
        label: الكلمات المفتاحية
        widget: list
        field:
          name: tag
          label: كلمة
          widget: string
      - name: body
        label: المحتوى
        widget: markdown