content:
  - name: "database"
    label: "قاعدة البيانات"
    type: "file"
    path: "data.json"
    format: "json"
    fields:
      - name: "articles"
        label: "المقالات"
        type: "list"
        fields:
          - {name: "title", label: "العنوان", type: "string"}
          - {name: "date", label: "التاريخ", type: "date"}
          - {name: "category", label: "القسم", type: "string"}
          - {name: "body", label: "المحتوى", type: "rich-text"}
