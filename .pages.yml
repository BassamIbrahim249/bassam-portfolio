collections:
  articles:
    output: true
    folder: content/articles
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime" }
      - { name: "category", label: "Category", widget: "select", options: ["innovation", "materials", "political", "nubian", "lifestyle"] }
      - { name: "headerImage", label: "Header Image", widget: "image" }
      - { name: "tags", label: "Tags", widget: "list", field: { name: "tag", label: "Tag", widget: "string" } }
      - { name: "body", label: "Body", widget: "markdown" }