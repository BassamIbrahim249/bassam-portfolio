content:
  - name: articles
    label: المقالات
    type: collection
    path: content/articles
    format: json
    fields:
      - name: title
        label: عنوان المقال
        type: string
        required: true
      - name: date
        label: تاريخ النشر
        type: date
      - name: category
        label: القسم
        type: select
        options:
          - { label: "ابتكار إنشائي", value: "innovation" }
          - { label: "علوم المواد", value: "materials" }
          - { label: "الأرشيف السياسي", value: "political" }
          - { label: "نوبيان", value: "nubian" }
          - { label: "نمط الحياة", value: "lifestyle" }
      - name: body
        label: المحتوى
        type: rich-text